        html.push('.soft-redacted .message-body{filter:blur(7px);user-select:none;transition:filter .15s ease;}.soft-redacted.revealed .message-body{filter:none;user-select:auto;}');
        html.push('.soft-redacted{cursor:pointer;}.soft-redacted .reveal-hint{display:block;color:#65707d;font-size:12px;margin-top:8px;}.soft-redacted.revealed .reveal-hint{display:none;}');
        html.push('.focus{border-color:#c6a642;background:#fffdf2;box-shadow:0 0 0 2px rgba(198,166,66,.16);}');
        html.push('.edit-note{margin-top:12px;padding:10px 12px;background:#f3f0e8;border-left:3px solid #8d7db8;color:#303943;font-size:14px;}');
        html.push('@media print{body{background:#fff;}main{max-width:none;padding:0;}.message{box-shadow:none;break-inside:avoid;}.soft-redacted .message-body{filter:none;}}');
        html.push('</style>');
        html.push('</head>');
        html.push('<body>');
        html.push('<main>');
        html.push('<h1>' + escapeHtml(title) + '</h1>');
        if (sourceExportName) {
          html.push('<div class="source">Source: ' + escapeHtml(sourceExportName) + '</div>');
        }

        var publishedCount = 0;
        for (var i = 0; i < allConversationsForDisplay.length; i++) {
          var conversation = allConversationsForDisplay[i];
          var conversationEdit = getConversationEdit(conversation.key);
          if (!conversationEdit.publish) continue;
          publishedCount++;

          html.push('<section class="conversation">');
          html.push('<h2>' + escapeHtml(conversation.title || 'Untitled') + '</h2>');
          html.push('<div class="conversation-date">Date: ' + escapeHtml(formatTimestamp(conversation.sortTimestampRaw)) + '</div>');

          for (var m = 0; m < conversation.messages.length; m++) {
            var message = conversation.messages[m];
            var messageKey = message.id || ('message-' + m);
            var messageEdit = getMessageEdit(conversation.key, messageKey);
            var action = messageEdit.action || 'none';
            var role = message.author || 'message';
            var roleClass = role.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'message';
            var className = 'message ' + roleClass;
            if (action === 'redact') className += ' redacted';
            if (action === 'softRedact') className += ' soft-redacted';
            if (action === 'focus') className += ' focus';

            html.push('<article class="' + escapeHtmlAttribute(className) + '"' + (action === 'softRedact' ? ' onclick="this.classList.toggle(&quot;revealed&quot;)"' : '') + '>');
            html.push('<header class="message-header">');
            html.push('<span class="role">' + escapeHtml(role) + '</span>');
            if (message.timestamp) html.push('<span class="message-meta">' + escapeHtml(message.timestamp) + '</span>');
            if (message.model) html.push('<span class="message-meta">' + escapeHtml(message.model) + '</span>');
            html.push('</header>');

            if (action === 'redact') {
              html.push('<div class="message-body">[REDACTED]</div>');
              html.push(renderHtmlNote(messageEdit.note));
              html.push('</article>');
              continue;
            }

            html.push('<div class="message-body">');
            html.push(renderMessagePartsToHtml(message.parts || []));
            html.push('</div>');
            if (action === 'softRedact') {
              html.push('<span class="reveal-hint">Click to reveal soft-redacted content.</span>');
            }
            html.push(renderHtmlNote(messageEdit.note));
            html.push('</article>');
          }

          html.push('</section>');
        }

        html.push('</main>');
        html.push('</body>');
        html.push('</html>');

        if (publishedCount === 0) return '';
        return html.join('\n') + '\n';
      }

      async function exportPublishedMarkdown() {
        if (!window.api || !window.api.saveMarkdown) {
          alert('Markdown save API not available');
          return;
        }
        var markdown = buildPublishedMarkdown();
        if (!markdown) {
          alert('No published threads to export.');
          return;
        }
        var res = await window.api.saveMarkdown(markdown);
        if (!res) return;
        if (res.error) {
          alert('Error exporting Markdown: ' + res.error);
          return;
        }
        setEditStatus('Exported ' + getFileNameFromPath(res.filePath));
      }

      async function exportPublishedHtml() {
        if (!window.api || !window.api.saveHtml) {
          alert('HTML save API not available');
          return;
        }
        var html = buildPublishedHtml();
        if (!html) {
          alert('No published threads to export.');
          return;
        }
        var res = await window.api.saveHtml(html);
        if (!res) return;
        if (res.error) {
          alert('Error exporting HTML: ' + res.error);
          return;
        }
        setEditStatus('Exported ' + getFileNameFromPath(res.filePath));
      }

      window.addEventListener('DOMContentLoaded', function() {
        cacheDom();
        var threadToggleBtn = document.getElementById('threadsToggleBtn');
        var editBtn = document.getElementById('editBtn');
        var threadSidebar = document.getElementById('threadSidebar');
        var mainArea = document.getElementById('mainArea');

        function setThreadSidebarOpen(isOpen) {
          if (!threadSidebar || !mainArea || !threadToggleBtn) return;
          threadSidebar.classList.toggle('open', isOpen);
          mainArea.classList.toggle('sidebar-open', isOpen);
          threadToggleBtn.classList.toggle('active', isOpen);
          threadToggleBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        }

        if (threadToggleBtn) {
          threadToggleBtn.addEventListener('click', function() {
            var shouldOpen = !threadSidebar.classList.contains('open');
            setThreadSidebarOpen(shouldOpen);
          });
        }

        if (editBtn) {
          editBtn.addEventListener('click', function() {
            var isEditMode = editBtn.classList.toggle('active');
            document.body.classList.toggle('edit-mode', isEditMode);
            editBtn.setAttribute('aria-pressed', isEditMode ? 'true' : 'false');
            renderThreadList();
          });
        }

        var threadList = dom.threadList;
        if (threadList) {
          threadList.addEventListener('click', function(event) {
            if (event.target && event.target.closest && event.target.closest('[data-edit-action]')) return;
            var target = event.target;
            while (target && target !== threadList && !target.classList.contains('thread-item')) {
              target = target.parentElement;
            }
            if (!target || target === threadList) return;
            var sectionId = target.getAttribute('data-target-id');
            if (!sectionId) return;
            setActiveConversation(sectionId);
            var conversationSection = document.getElementById(sectionId);
            if (conversationSection && mainArea) {
              mainArea.scrollTo({
                top: conversationSection.offsetTop - 16,
                behavior: 'smooth'
              });
            }
          });

          threadList.addEventListener('change', function(event) {
            var target = event.target;
            if (!target || !target.getAttribute) return;
            if (target.getAttribute('data-edit-action') !== 'thread-conversation-publish') return;
            var conversationKey = target.getAttribute('data-conversation-key');
            if (!conversationKey) return;
            getConversationEdit(conversationKey).publish = !!target.checked;
            var conversationCheckboxes = document.querySelectorAll('.conversation [data-edit-action="conversation-publish"]');
            for (var cb = 0; cb < conversationCheckboxes.length; cb++) {
              var conversationEl = conversationCheckboxes[cb].closest ? conversationCheckboxes[cb].closest('.conversation') : null;
              if (conversationEl && conversationEl.getAttribute('data-conversation-key') === conversationKey) {
                conversationCheckboxes[cb].checked = !!target.checked;
              }
            }
            setEditStatus('Unsaved edit changes');
          });
        }

        var root = dom.root;
        if (root) {
          root.addEventListener('click', function(event) {
            var softMessage = event.target.closest ? event.target.closest('.message.edit-softRedact') : null;
            if (softMessage && !document.body.classList.contains('edit-mode')) {
              softMessage.classList.toggle('soft-redact-revealed');
            }
            var conversation = event.target.closest ? event.target.closest('.conversation') : null;
            if (conversation && conversation.id) {
              setActiveConversation(conversation.id);
            }
          });

          root.addEventListener('change', function(event) {
            var target = event.target;
            if (!target || !target.getAttribute) return;
            var editAction = target.getAttribute('data-edit-action');
            if (editAction === 'conversation-publish') {
              var conversationEl = target.closest ? target.closest('.conversation') : null;
              var conversationKey = conversationEl ? conversationEl.getAttribute('data-conversation-key') : '';
              if (!conversationKey) return;
              getConversationEdit(conversationKey).publish = !!target.checked;
              var threadCheckboxes = document.querySelectorAll('#threadList [data-edit-action="thread-conversation-publish"]');
              for (var tc = 0; tc < threadCheckboxes.length; tc++) {
                if (threadCheckboxes[tc].getAttribute('data-conversation-key') === conversationKey) {
                  threadCheckboxes[tc].checked = !!target.checked;
                }
              }
              setEditStatus('Unsaved edit changes');
            } else if (editAction === 'message-action') {
              var messageEl = target.closest ? target.closest('.message') : null;
              if (!messageEl) return;
              var messageConversationKey = messageEl.getAttribute('data-conversation-key');
              var messageKey = messageEl.getAttribute('data-message-key');
              if (!messageConversationKey || !messageKey) return;
              var messageEdit = getMessageEdit(messageConversationKey, messageKey);
              messageEdit.action = target.value || 'none';
              messageEl.className = messageEl.className
                .replace(/\sedit-redact|\sedit-softRedact|\sedit-focus|\ssoft-redact-revealed/g, '') +
                getMessageActionClass(messageEdit.action);
              syncMessagePreviewNote(messageEl, messageEdit);
              setEditStatus('Unsaved edit changes');
            }
          });

          root.addEventListener('input', function(event) {
            var target = event.target;
            if (!target || !target.getAttribute) return;
            if (target.getAttribute('data-edit-action') !== 'message-note') return;
            var messageEl = target.closest ? target.closest('.message') : null;
            if (!messageEl) return;
            var messageConversationKey = messageEl.getAttribute('data-conversation-key');
            var messageKey = messageEl.getAttribute('data-message-key');
            if (!messageConversationKey || !messageKey) return;
            var messageEdit = getMessageEdit(messageConversationKey, messageKey);
            messageEdit.note = target.value || '';
            syncMessagePreviewNote(messageEl, messageEdit);
            setEditStatus('Unsaved edit changes');
          });
        }

        var threadSearchInput = dom.threadSearchInput;
        if (threadSearchInput) {
          threadSearchInput.addEventListener('input', function() {
            searchQuery = threadSearchInput.value || '';
            if (searchDebounceTimer) {
              clearTimeout(searchDebounceTimer);
            }
            searchDebounceTimer = setTimeout(function() {
              searchDebounceTimer = null;
              applyFiltersAndRenderAfterPaint();
              if (mainArea) mainArea.scrollTo({ top: 0 });
            }, 275);
          });
        }

        var conversationSearchInput = dom.conversationSearchInput;
        if (conversationSearchInput) {
          conversationSearchInput.addEventListener('input', function() {
            conversationSearchQuery = conversationSearchInput.value || '';
            runConversationSearch();
          });
        }

        var conversationSearchPrevBtn = dom.conversationSearchPrevBtn;
        var conversationSearchNextBtn = dom.conversationSearchNextBtn;
        if (conversationSearchPrevBtn) {
          conversationSearchPrevBtn.addEventListener('click', function() {
            selectConversationSearchMatch(currentConversationMatchIndex - 1);
          });
        }
        if (conversationSearchNextBtn) {
          conversationSearchNextBtn.addEventListener('click', function() {
            selectConversationSearchMatch(currentConversationMatchIndex + 1);
          });
        }

        var pageSizeSelect = dom.pageSizeSelect;
        if (pageSizeSelect) {
          pageSizeSelect.addEventListener('change', function() {
            pageSize = Number(pageSizeSelect.value) || 25;
            currentPage = 1;
            if (mainArea) mainArea.scrollTo({ top: 0 });
            renderCurrentPageAfterPaint();
          });
        }

        function goToPage(page) {
          currentPage = Math.min(Math.max(page, 1), getTotalPages());
          if (mainArea) mainArea.scrollTo({ top: 0 });
          renderCurrentPageAfterPaint();
        }

        var firstPageBtn = dom.firstPageBtn;
        var prevPageBtn = dom.prevPageBtn;
        var nextPageBtn = dom.nextPageBtn;
        var lastPageBtn = dom.lastPageBtn;

        if (firstPageBtn) {
          firstPageBtn.addEventListener('click', function() {
            goToPage(1);
          });
        }
        if (prevPageBtn) {
          prevPageBtn.addEventListener('click', function() {
            goToPage(currentPage - 1);
          });
        }
        if (nextPageBtn) {
          nextPageBtn.addEventListener('click', function() {
            goToPage(currentPage + 1);
          });
        }
        if (lastPageBtn) {
          lastPageBtn.addEventListener('click', function() {
            goToPage(getTotalPages());
          });
        }

        async function importAndRender() {
          if (!window.api || !window.api.openFile) {
            alert('File open API not available');
            return;
          }
          showLoading('Loading...');
          try {
            var res = await window.api.openFile();
            if (!res) return;
            if (res.error) {
              alert('Error loading file: ' + res.error);
              return;
            }
            var parsed = res.data;
            var toRender = null;
            var assets = null;
            if (Array.isArray(parsed)) {
              toRender = parsed;
            } else if (parsed && parsed.conversations) {
              toRender = parsed.conversations;
              assets = mergeAssetMaps(parsed.assets, res.assets);
            } else if (parsed) {
              toRender = [parsed];
            }
            if (!assets) assets = res.assets || null;
            renderData(toRender, assets, getFileNameFromPath(res.filePath));
          } catch (e) {
            console.error(e);
            alert('Error loading file');
          } finally {
            hideLoading();
          }
        }

        var btn = document.getElementById('openFileBtn');
        if (btn) {
          btn.addEventListener('click', importAndRender);
        }

        if (window.api && window.api.onImportFromMenu) {
          window.api.onImportFromMenu(importAndRender);
        }
        if (window.api && window.api.onSaveEditsFromMenu) {
          window.api.onSaveEditsFromMenu(function() {
            saveEditsToFile().catch(function(e) {
              console.error(e);
              alert('Error saving edits');
            });
          });
        }
        if (window.api && window.api.onLoadEditsFromMenu) {
          window.api.onLoadEditsFromMenu(function() {
            loadEditsFromFile().catch(function(e) {
              console.error(e);
              alert('Error loading edits');
            });
          });
        }
        if (window.api && window.api.onExportMarkdownFromMenu) {
          window.api.onExportMarkdownFromMenu(function() {
            exportPublishedMarkdown().catch(function(e) {
              console.error(e);
              alert('Error exporting Markdown');
            });
          });
        }
        if (window.api && window.api.onExportHtmlFromMenu) {
          window.api.onExportHtmlFromMenu(function() {
            exportPublishedHtml().catch(function(e) {
              console.error(e);
              alert('Error exporting HTML');
            });
          });
        }

        setImportUiState(false);

        if (window.api && window.api.loadDefault) {
          showLoading('Loading default conversation...');
          window.api.loadDefault().then(function(res) {
            if (!res || res.error || !res.data) return;
            var parsed = res.data;
            var toRender = null;
            var assets = null;
            if (Array.isArray(parsed)) {
              toRender = parsed;
            } else if (parsed && parsed.conversations) {
              toRender = parsed.conversations;
              assets = mergeAssetMaps(parsed.assets, res.assets);
            } else if (parsed) {
              toRender = [parsed];
            }
            if (!assets) assets = res.assets || null;
            renderData(toRender, assets, getFileNameFromPath(res.filePath));
          }).catch(function() {}).finally(function() {
            hideLoading();
          });
        }
      });
    </script>

        <button id="editBtn" class="nav-icon-btn" type="button" aria-label="Edit" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 17.25V21h3.75L17.8 9.94l-3.75-3.75L3 17.25zm17.71-10.04a1.004 1.004 0 0 0 0-1.42l-2.5-2.5a1.004 1.004 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 2-1.66z"></path>
          </svg>
        </button>
      </nav>

      <aside id="threadSidebar" aria-label="Threads">
        <div class="sidebar-header">Threads</div>
        <div class="sidebar-search">
          <input id="threadSearchInput" type="search" placeholder="Search conversations" autocomplete="off" disabled>
        </div>
        <div id="threadList"></div>
      </aside>

      <main id="mainArea">
        <div class="content">
          <div id="controls">
            <button id="openFileBtn">Open Conversation</button>
          </div>
          <div id="paginationControls" aria-label="Pagination">
            <label for="pageSizeSelect">
              Page size
              <select id="pageSizeSelect">
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </label>
            <button id="firstPageBtn" type="button">First</button>
            <button id="prevPageBtn" type="button">Previous</button>
            <span id="pageIndicator" aria-live="polite">Page 0 of 0</span>
            <span id="pageLoadingIndicator" aria-live="polite">Loading page...</span>
            <button id="nextPageBtn" type="button">Next</button>
            <button id="lastPageBtn" type="button">Last</button>
          </div>
          <div id="editsControls" aria-label="Edit metadata">
            <span id="editsStatus" aria-live="polite"></span>
          </div>
          <div id="conversationSearchControls" aria-label="Search selected conversation">
            <input id="conversationSearchInput" type="search" placeholder="Search selected conversation" autocomplete="off" disabled>
            <button id="conversationSearchPrevBtn" type="button" disabled>Previous</button>
            <span id="conversationMatchCount" aria-live="polite">0 of 0</span>
            <button id="conversationSearchNextBtn" type="button" disabled>Next</button>
          </div>
          <div id="root"></div>
        </div>
      </main>
    </div>

    <div id="loadingOverlay">
      <div class="loading-box">
        <div class="spinner" aria-hidden="true"></div>
        <div class="loading-text">Loading...</div>
      </div>
    </div>
  </body>
</html>
