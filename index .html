<html>
  <head>
    <title>ChatGPT Conversation Reader</title>
    <style>
      :root {
        --rail-width: 64px;
        --sidebar-width: 320px;
        --reader-bg: #222222;
        --reader-panel: rgba(34, 34, 34, 0.96);
        --reader-text: #dddddd;
        --reader-muted: rgba(221, 221, 221, 0.56);
        --reader-soft: rgba(221, 221, 221, 0.74);
        --reader-border: rgba(255, 255, 255, 0.11);
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: 'SF Pro Display', -apple-system-headline, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: url('./images/background.png') center / cover no-repeat fixed;
        color: var(--reader-text);
        margin: 0;
        text-align: left;
        height: 100vh;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      #appLayout {
        display: flex;
        height: 100vh;
      }

      #leftNav {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: var(--rail-width);
        background: rgba(10, 10, 10, 0.8);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding-top: 16px;
        z-index: 30;
      }

      .nav-icon-btn {
        width: 40px;
        height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.04);
        color: #DDD;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .nav-icon-btn:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .nav-icon-btn.active {
        background: rgba(255, 255, 255, 0.2);
      }

      .nav-icon-btn svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      #threadSidebar {
        position: fixed;
        top: 0;
        left: var(--rail-width);
        height: 100vh;
        width: var(--sidebar-width);
        background: rgba(18, 18, 18, 0.95);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        transform: translateX(-100%);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: transform 0.2s ease, opacity 0.2s ease, visibility 0s linear 0.2s;
        z-index: 25;
        display: flex;
        flex-direction: column;
      }

      #threadSidebar.open {
        transform: translateX(0);
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transition: transform 0.2s ease, opacity 0.2s ease, visibility 0s linear 0s;
      }

      #conversationSearchControls {
        position: fixed;
        top: 0;
        left: var(--rail-width);
        height: 100vh;
        width: var(--sidebar-width);
        background: rgba(18, 18, 18, 0.95);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        transform: translateX(-100%);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: transform 0.2s ease, opacity 0.2s ease, visibility 0s linear 0.2s;
        z-index: 27;
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 16px;
        color: #DDD;
      }

      #conversationSearchControls.open {
        transform: translateX(0);
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transition: transform 0.2s ease, opacity 0.2s ease, visibility 0s linear 0s;
      }

      .search-pane-title {
        font-size: 0.95rem;
        font-weight: 600;
      }

      .search-pane-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .search-pane-options,
      .search-pane-bulk-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        font-size: 12px;
        color: var(--reader-muted);
      }

      .search-pane-options label {
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }

      .sidebar-header {
        padding: 16px;
        font-size: 0.95rem;
        font-weight: 600;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .sidebar-search {
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      #threadSearchInput {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        color: #DDD;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        padding: 9px 10px;
        font-size: 0.9rem;
        outline: none;
      }

      #threadSearchInput:focus {
        border-color: rgba(255, 255, 255, 0.32);
        background: rgba(255, 255, 255, 0.09);
      }

      #threadSearchInput::placeholder {
        color: rgba(221, 221, 221, 0.55);
      }

      #threadSearchInput:disabled {
        opacity: 0.45;
      }

      #threadList {
        flex: 1;
        overflow-y: hidden;
        padding: 8px;
      }

      #threadSidebar.open #threadList {
        overflow-y: auto;
      }

      #conversationSearchControls.open {
        overflow-y: auto;
      }

      .thread-item {
        width: 100%;
        background: transparent;
        border: 1px solid transparent;
        color: var(--reader-text);
        text-align: left;
        padding: 10px 12px 11px;
        border-radius: 8px;
        cursor: pointer;
        transition: background-color 0.12s ease, border-color 0.12s ease;
      }

      .thread-item:hover {
        background: rgba(255, 255, 255, 0.075);
        border-color: rgba(255, 255, 255, 0.06);
      }

      .thread-item.active {
        background: rgba(255, 255, 255, 0.14);
        border-color: rgba(255, 255, 255, 0.09);
      }

      .thread-item .title {
        font-size: 0.92rem;
        font-weight: 600;
        line-height: 1.32;
      }

      .thread-title-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }

      .thread-title-row .title {
        flex: 1;
        min-width: 0;
      }

      .thread-item .meta {
        color: var(--reader-muted);
        font-size: 0.75rem;
        line-height: 1.3;
        margin-top: 5px;
      }

      #mainArea {
        margin-left: var(--rail-width);
        width: calc(100% - var(--rail-width));
        height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
        transition: margin-left 0.2s ease, width 0.2s ease;
        padding: 20px 20px 96px;
        scrollbar-color: rgba(221, 221, 221, 0.34) rgba(18, 18, 18, 0.2);
      }

      #mainArea.pane-open {
        margin-left: calc(var(--rail-width) + var(--sidebar-width));
        width: calc(100% - (var(--rail-width) + var(--sidebar-width)));
      }

      .content {
        max-width: 960px;
        width: 100%;
        min-height: 100%;
        margin: 0 auto;
        overflow-x: hidden;
      }

      #mainArea::-webkit-scrollbar,
      #threadList::-webkit-scrollbar {
        width: 10px;
      }

      #mainArea::-webkit-scrollbar-track,
      #threadList::-webkit-scrollbar-track {
        background: rgba(18, 18, 18, 0.18);
      }

      #mainArea::-webkit-scrollbar-thumb,
      #threadList::-webkit-scrollbar-thumb {
        background: rgba(221, 221, 221, 0.28);
        border: 3px solid rgba(18, 18, 18, 0.18);
        border-radius: 999px;
      }

      #mainArea::-webkit-scrollbar-thumb:hover,
      #threadList::-webkit-scrollbar-thumb:hover {
        background: rgba(221, 221, 221, 0.42);
      }

      #controls {
        margin-bottom: 12px;
      }

      #paginationControls {
        display: none;
        position: fixed;
        left: var(--rail-width);
        right: 0;
        bottom: 0;
        z-index: 20;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 60px;
        padding: 10px 18px 11px;
        margin-bottom: 0;
        background: rgba(20, 20, 20, 0.88);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 -10px 26px rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(10px);
        color: var(--reader-text);
        transition: left 0.2s ease;
      }

      #mainArea.pane-open #paginationControls {
        left: calc(var(--rail-width) + var(--sidebar-width));
      }

      #paginationControls label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.84rem;
        color: var(--reader-soft);
      }

      #pageSizeSelect {
        background: rgba(34, 34, 34, 0.92);
        color: var(--reader-text);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        padding: 7px 8px;
      }

      #paginationControls button {
        background: rgba(34, 34, 34, 0.9);
        color: var(--reader-text);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 6px;
        cursor: pointer;
      }

      #paginationControls button:not(:disabled):hover,
      #conversationSearchControls button:not(:disabled):hover,
      #editsControls button:not(:disabled):hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.24);
      }

      #paginationControls button:disabled {
        cursor: default;
        opacity: 0.4;
      }

      #pageIndicator {
        min-width: 140px;
        text-align: center;
        font-size: 0.86rem;
        color: var(--reader-soft);
      }

      #pageLoadingIndicator {
        display: none;
        min-width: 92px;
        font-size: 0.84rem;
        color: var(--reader-muted);
      }

      #conversationSearchInput {
        width: 100%;
        background: rgba(34, 34, 34, 0.92);
        color: var(--reader-text);
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 0.9rem;
        outline: none;
      }

      #conversationSearchInput:focus {
        border-color: rgba(255, 255, 255, 0.36);
      }

      #conversationSearchInput:disabled {
        opacity: 0.45;
      }

      #conversationSearchControls button {
        flex: 1;
        background: rgba(34, 34, 34, 0.9);
        color: var(--reader-text);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 6px;
        cursor: pointer;
      }

      #conversationSearchControls button:disabled {
        cursor: default;
        opacity: 0.4;
      }

      #conversationMatchCount {
        min-width: 70px;
        text-align: left;
        font-size: 0.9rem;
        opacity: 0.85;
      }

      #editsControls {
        display: none;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 20px;
        margin: 0 0 8px;
        color: #DDD;
      }

      #editsControls button {
        display: none;
        background: rgba(34, 34, 34, 0.9);
        color: var(--reader-text);
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 6px;
        cursor: pointer;
      }

      #editsStatus {
        font-size: 0.85rem;
        opacity: 0.72;
      }

      .conversation-search-match {
        background: rgba(255, 215, 0, 0.28);
        color: inherit;
        border-radius: 2px;
        padding: 0 1px;
      }

      .conversation-search-match.current {
        background: rgba(255, 215, 0, 0.65);
        outline: 1px solid rgba(255, 255, 255, 0.55);
      }

      .empty-state {
        color: var(--reader-muted);
        padding: 34px 18px;
        text-align: center;
        font-size: 0.95rem;
        line-height: 1.5;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 8px;
        background: rgba(34, 34, 34, 0.58);
      }

      button {
        padding: 8px 12px;
        font-size: 14px;
      }

      h4 {
        margin: 0;
        font-size: clamp(1.28rem, 1rem + 0.7vw, 1.58rem);
        line-height: 1.28;
        letter-spacing: 0;
        color: #eeeeee;
        text-align: center;
        margin-bottom: 38px;
        font-weight: 650;
      }

      h4::after {
        content: "";
        display: block;
        width: 3em;
        height: 1px;
        background: #DDD;
        opacity: 15%;
        margin: 15px auto 0;
      }

      .conversation-meta {
        display: flex;
        justify-content: center;
        margin-top: -24px;
        margin-bottom: 24px;
      }

      .publish-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
        opacity: 0.82;
      }

      .publish-toggle input {
        accent-color: #DDD;
      }

      .publish-edit-control {
        display: none;
      }

      body.edit-mode .publish-edit-control {
        display: inline-flex;
      }

      .publish-edit-container {
        display: none;
      }

      body.edit-mode .publish-edit-container {
        display: flex;
      }

      #root {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .conversation {
        padding: 22px 24px 26px;
        display: flex;
        flex-direction: column;
        width: 100%;
        min-width: 0;
        background: var(--reader-panel);
        border: 1px solid rgba(255, 255, 255, 0.055);
        border-radius: 6px;
        margin-bottom: 22px;
        box-shadow: 0 1px 10px rgba(0, 0, 0, 0.08);
      }

      .message-header {
        display: flex;
        justify-content: left;
        align-items: baseline;
        flex-wrap: wrap;
        margin-bottom: 8px;
        column-gap: 9px;
        row-gap: 3px;
        font-family: 'SF Pro Display', -apple-system-headline, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.2;
      }

      .message-edit-controls {
        display: none;
      }

      body.edit-mode .message-edit-controls {
        display: inline-flex;
      }

      .message-action {
        margin-left: auto;
        align-items: center;
        gap: 6px;
      }

      .message-action select {
        background: #1d1d1d;
        color: #DDD;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 5px;
        padding: 3px 6px;
        font-size: 0.75rem;
      }

      .message-note {
        width: 100%;
        margin: 4px 0 12px;
      }

      body.edit-mode .message-note {
        display: block;
      }

      .message-note input {
        width: 100%;
        background: #1d1d1d;
        color: #DDD;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 5px;
        padding: 6px 8px;
        font-size: 0.8rem;
      }

      .annotation-toolbar {
        display: none;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        margin: 4px 0 12px;
        color: var(--reader-muted);
        font-family: system-ui, 'Segoe UI', sans-serif;
        font-size: 0.78rem;
      }

      body.edit-mode .annotation-toolbar.active {
        display: flex;
      }

      .annotation-toolbar button,
      .search-pane-bulk-actions button {
        background: #1d1d1d;
        color: #DDD;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 5px;
        padding: 5px 7px;
        font-size: 0.75rem;
        cursor: pointer;
      }

      .annotation-toolbar button:disabled,
      .search-pane-bulk-actions button:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .span-redact {
        display: inline-block;
        background: #050505;
        color: rgba(238, 238, 238, 0.78);
        border-radius: 3px;
        padding: 0 4px;
        font-family: system-ui, 'Segoe UI', sans-serif;
        font-size: 0.86em;
        font-weight: 700;
        letter-spacing: 0.06em;
      }

      .span-softRedact {
        filter: blur(6px);
        user-select: none;
        transition: filter 0.15s ease;
        cursor: pointer;
      }

      .message.soft-redact-revealed .span-softRedact {
        filter: none;
        user-select: auto;
      }

      .span-focus {
        background: rgba(198, 166, 66, 0.28);
        border-radius: 3px;
        box-shadow: inset 0 -1px 0 rgba(198, 166, 66, 0.55);
      }

      body:not(.edit-mode) .message.edit-redact {
        background: rgba(10, 10, 10, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      body:not(.edit-mode) .message.edit-redact .message-body > * {
        display: none;
      }

      body:not(.edit-mode) .message.edit-redact .message-body::after {
        content: "[REDACTED]";
        display: block;
        color: rgba(238, 238, 238, 0.74);
        font-family: system-ui, 'Segoe UI', sans-serif;
        font-size: 0.9rem;
        letter-spacing: 0.08em;
        text-align: center;
        padding: 14px 0;
      }

      body:not(.edit-mode) .message.edit-softRedact {
        cursor: pointer;
        background: rgba(255, 255, 255, 0.035);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      body:not(.edit-mode) .message.edit-softRedact .message-body > * {
        filter: blur(20px);
        user-select: none;
        transition: filter 0.15s ease;
      }

      body:not(.edit-mode) .message.edit-softRedact.soft-redact-revealed .message-body > * {
        filter: none;
        user-select: auto;
      }

      body:not(.edit-mode) .message.edit-softRedact .message-body::after {
        content: "Click to reveal/hide";
        display: block;
        margin-top: 8px;
        font-family: system-ui, 'Segoe UI', sans-serif;
        font-size: 0.78rem;
        color: rgba(221, 221, 221, 0.55);
      }

      body:not(.edit-mode) .message.edit-focus {
        background: rgba(180, 205, 190, 0.08);
        border: 1px solid rgba(190, 220, 205, 0.2);
        box-shadow: inset 3px 0 0 rgba(190, 220, 205, 0.35);
      }

      .message-preview-note {
        display: none;
        margin-top: 12px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--reader-muted);
        font-family: system-ui, 'Segoe UI', sans-serif;
        font-size: 0.82rem;
        line-height: 1.45;
        letter-spacing: 0;
        white-space: normal;
      }

      body:not(.edit-mode) .message.edit-redact .message-preview-note,
      body:not(.edit-mode) .message.edit-softRedact .message-preview-note,
      body:not(.edit-mode) .message.edit-focus .message-preview-note {
        display: block;
      }

      .message {
        padding: 10px 8px 11px;
        border-radius: 4px;
        letter-spacing: 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
        margin: 24px 0;
        font-size: 1.08rem;
        opacity: 0.94;
        transition: background-color 0.12s ease, border-color 0.12s ease;
      }

      .message:hover {
        background: rgba(255, 255, 255, 0.018);
      }

      .message:first-of-type {
        margin-top: 0;
      }

      .message:last-of-type {
        margin-bottom: 0;
      }

      .message-body {
        line-height: 1.58;
      }

      .message-body .text-part + .text-part,
      .message-body .text-part + .message-image-wrap,
      .message-body .message-image-wrap + .text-part,
      .message-body .asset-placeholder + .text-part {
        margin-top: 0.95em;
      }

      .message.user .message-body {
        color: #abd4ee;
        font-family: "Playpen Sans", cursive;
        font-weight: 340;
        font-style: normal;
      }

      .message.AI .message-body {
        color: #cccc9b;
        font-family: "Play", sans-serif;
        font-weight: 400;
        font-style: normal;
      }

      .message-image-wrap {
        margin: 10px 0;
      }

      .message-image {
        display: block;
        max-width: 100%;
        max-height: 640px;
        width: auto;
        height: auto;
        border-radius: 5px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        object-fit: contain;
        background: rgba(0, 0, 0, 0.18);
      }

      .asset-placeholder {
        display: inline-block;
        margin: 6px 0;
        color: rgba(221, 221, 221, 0.58);
        font-family: system-ui, 'Segoe UI', sans-serif;
        font-size: 0.85rem;
      }

      .author {
        color: rgba(238, 238, 238, 0.72);
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.01em;
      }

      .author::first-letter {
        text-transform: uppercase;
      }

      .timestamp,
      .model {
        color: var(--reader-muted);
        font-size: 0.78rem;
        font-weight: 500;
      }

      .model {
        color: rgba(221, 221, 221, 0.43);
      }

      #openFileBtn {
        background: #222222;
        color: #DDD;
        padding: 20px;
        border-radius: 5px;
      }

      /* Loading overlay */
      #loadingOverlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.4);
        z-index: 9999;
      }

      .loading-box {
        background: #fff;
        padding: 18px 22px;
        border-radius: 8px;
        display: flex;
        gap: 12px;
        align-items: center;
        box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      }

      .spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 4px solid #e0e0e0;
        border-top-color: #3b82f6;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 14px;
        color: #111;
      }
    </style>
    <script>
      var jsonData = [];
      var assetsJson = {};
      var allConversationsForDisplay = [];
      var conversationsForDisplay = [];
      var renderedConversations = [];
      var currentPage = 1;
      var pageSize = 25;
      var isPageLoading = false;
      var searchQuery = '';
      var searchDebounceTimer = null;
      var activeConversationId = null;
      var activeConversationKey = null;
      var conversationSearchQuery = '';
      var conversationSearchCaseSensitive = false;
      var conversationSearchWholeWord = false;
      var conversationSearchDebounceTimer = null;
      var conversationSearchLastRunQuery = '';
      var conversationSearchMatches = [];
      var currentConversationMatchIndex = -1;
      var pendingConversationMatchIndex = -1;
      var currentSpanSelection = null;
      var sourceExportName = '';
      var editsState = createEmptyEditsState('');
      var dom = {};
      var conversationSearchDebugFields = ['conversation title', 'message author role', 'message author name', 'message text', 'audio transcript'];
      var conversationSearchIndexStats = {
        conversationsIndexed: 0,
        messagesIndexed: 0,
        totalSearchableTextLength: 0
      };

      function showLoading(text) {

      function getConversationMessages(conversation) {
        var messages = [];
        if (!conversation || !conversation.mapping || !conversation.current_node) return messages;
        var currentNode = conversation.current_node;
        while (currentNode != null) {
          var node = conversation.mapping[currentNode];
          if (!node) break;
          var metadata = (node && node.message && node.message.metadata) || {};
          if (
            node.message &&
            node.message.content &&
            (
              (node.message.content.parts && node.message.content.parts.length > 0) ||
              (metadata.attachments && metadata.attachments.length > 0)
            ) &&
            (node.message.author.role !== 'system' || metadata.is_user_system_message)
          ) {
            var originalAuthor = node.message.author || {};
            var author = originalAuthor.role;
            var authorName = originalAuthor.name || '';
            if (author === 'assistant' || author === 'tool') {
              author = 'ChatGPT';
            } else if (author === 'system' && metadata.is_user_system_message) {
              author = 'Custom user info';
            }

            if (node.message.content.content_type == 'text' || node.message.content.content_type == 'multimodal_text') {
              var parts = [];
              var seenAssetPointers = {};
              var contentParts = node.message.content.parts || [];
              for (var i = 0; i < contentParts.length; i++) {
                var part = contentParts[i];
                if (typeof part === 'string' && part.length > 0) {
                  parts.push({ text: part });
                } else if (part.content_type == 'audio_transcription') {
                  parts.push({ transcript: part.text });
                } else if (part.content_type == 'audio_asset_pointer' || part.content_type == 'image_asset_pointer' || part.content_type == 'video_container_asset_pointer') {
                  parts.push({ asset: part });
                  if (part.asset_pointer) seenAssetPointers[part.asset_pointer] = true;
                } else if (part.content_type == 'real_time_user_audio_video_asset_pointer') {
                  if (part.audio_asset_pointer) {
                    parts.push({ asset: part.audio_asset_pointer });
                  }
                  if (part.video_container_asset_pointer) {
                    parts.push({ asset: part.video_container_asset_pointer });
                  }
                  var frames = part.frames_asset_pointers || [];
                  for (var j = 0; j < frames.length; j++) {
                    parts.push({ asset: frames[j] });
                  }
                }
              }

              var attachments = metadata.attachments || [];
              for (var k = 0; k < attachments.length; k++) {
                var attachment = attachments[k];
                if (!attachment) continue;
                var attachmentPointer = attachment.asset_pointer || attachment.id || attachment.file_id || attachment.name || '';
                var attachmentKey = attachment.asset_pointer || (attachment.id ? 'sediment://' + attachment.id : attachmentPointer);
                var isImageAttachment = attachment.mime_type && attachment.mime_type.indexOf('image/') === 0;
                if (isImageAttachment && attachmentKey && !seenAssetPointers[attachmentKey]) {
                  parts.push({
                    asset: {
                      content_type: 'image_asset_pointer',
                      asset_pointer: attachmentKey,
                      id: attachment.id,
                      name: attachment.name,
                      mime_type: attachment.mime_type,
                      width: attachment.width,
                      height: attachment.height
                    }
                  });
                  seenAssetPointers[attachmentKey] = true;
                }
              }

              if (parts.length > 0) {
                var timestampRaw = Number(node.message.create_time) || 0;
                var model = metadata.model_slug || metadata.model || null;
                var timestamp = timestampRaw
                  ? new Date(timestampRaw * 1000).toLocaleString()
                  : null;

                messages.push({
                  id: (node.message && node.message.id) || currentNode || String(messages.length),
                  author: author,
                  authorName: authorName,
                  parts: parts,
                  timestamp: timestamp,
                  timestampRaw: timestampRaw,
                  model: model
                });
              }
            }
          }
          currentNode = node.parent;
        }
        return messages.reverse();
      }

      function normalizeSearchText(value) {

      function normalizeQueryText(value, caseSensitive) {

      function getSearchablePartText(part) {
        if (!part) return '';

      function isWordCharacter(char) {
        return /[A-Za-z0-9_]/.test(char || '');

      function isWholeWordMatch(text, start, length) {
        return !isWordCharacter(text.charAt(start - 1)) && !isWordCharacter(text.charAt(start + length));
      }

      function findTextMatches(text, query, options) {
        var matches = [];
        if (!text || !query) return matches;
        var caseSensitive = !!(options && options.caseSensitive);
        var wholeWord = !!(options && options.wholeWord);
        var haystack = normalizeQueryText(text, caseSensitive);
        var needle = normalizeQueryText(query, caseSensitive);
        if (!needle) return matches;
        var start = 0;
        var found = haystack.indexOf(needle, start);
        while (found !== -1) {
          if (!wholeWord || isWholeWordMatch(text, found, query.length)) {
            matches.push({ start: found, end: found + query.length });
          }
          start = found + Math.max(needle.length, 1);
          found = haystack.indexOf(needle, start);
        }
        return matches;
      }

      function isSafeLink(url) {

      function mergeAssetMaps() {

      function getAssetId(asset) {

      function resolveAssetInfo(asset) {
        if (!asset) return '';
        var pointer = asset.asset_pointer || asset.id || asset.file_id || asset.name || '';
        var assetId = getAssetId(asset);
        var candidates = [
          pointer,
          assetId,
          assetId + '-sanitized',
          asset.name
        ];

        for (var i = 0; i < candidates.length; i++) {
          var candidate = candidates[i];

      function isImageAsset(asset, resolvedUrl) {
        if (!asset) return false;

        return /\.(png|jpe?g|webp|gif|bmp|avif)(\?|#|$)/i.test(resolvedUrl || asset.name || asset.asset_pointer || '');

      function formatTimestamp(timestampRaw) {

      function escapeHtml(text) {
        if (typeof text !== 'string') return '';

          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')

      function createAnnotationId() {
        if (window.crypto && window.crypto.randomUUID) return window.crypto.randomUUID();

      }

      function getAnnotationRank(type) {
        if (type === 'redact') return 3;
        if (type === 'softRedact') return 2;
        if (type === 'focus') return 1;
        return 0;
      }

      function normalizeAnnotation(annotation, textLength) {
        if (!annotation) return null;
        var type = annotation.type;
        if (['redact', 'softRedact', 'focus'].indexOf(type) === -1) return null;
        var start = Math.max(0, Math.min(Number(annotation.start) || 0, textLength));
        var end = Math.max(0, Math.min(Number(annotation.end) || 0, textLength));
        if (end <= start) return null;
        return {
          id: annotation.id || createAnnotationId(),
          type: type,
          start: start,
          end: end,
          partIndex: Number(annotation.partIndex) || 0,
          source: annotation.source || 'manual',
          text: annotation.text || ''
        };
      }

      function getAnnotationsForPart(messageEdit, partIndex, textLength) {
        var annotations = (messageEdit && Array.isArray(messageEdit.annotations)) ? messageEdit.annotations : [];
        var result = [];
        for (var i = 0; i < annotations.length; i++) {
          var annotation = normalizeAnnotation(annotations[i], textLength);
          if (annotation && annotation.partIndex === partIndex) result.push(annotation);
        }
        return result;
      }

      function messageHasAnnotationType(messageEdit, type) {
        var annotations = (messageEdit && Array.isArray(messageEdit.annotations)) ? messageEdit.annotations : [];
        for (var i = 0; i < annotations.length; i++) {
          if (annotations[i] && annotations[i].type === type) return true;
        }
        return false;
      }

      function buildAnnotatedTextSegments(text, annotations) {
        text = String(text || '');
        var points = [0, text.length];
        var normalized = [];
        for (var i = 0; i < (annotations || []).length; i++) {
          var annotation = normalizeAnnotation(annotations[i], text.length);
          if (!annotation) continue;
          normalized.push(annotation);
          points.push(annotation.start, annotation.end);
        }
        points.sort(function(a, b) { return a - b; });

        var uniquePoints = [];
        for (var p = 0; p < points.length; p++) {
          if (p === 0 || points[p] !== points[p - 1]) uniquePoints.push(points[p]);
        }

        var segments = [];
        for (var u = 0; u < uniquePoints.length - 1; u++) {
          var start = uniquePoints[u];
          var end = uniquePoints[u + 1];
          if (end <= start) continue;
          var type = '';
          var rank = 0;
          for (var a = 0; a < normalized.length; a++) {
            var active = normalized[a];
            if (active.start < end && active.end > start && getAnnotationRank(active.type) > rank) {
              type = active.type;
              rank = getAnnotationRank(active.type);
            }
          }
          var previous = segments[segments.length - 1];
          if (previous && previous.type === type && previous.end === start) {
            previous.end = end;
            previous.text += text.slice(start, end);
          } else {
            segments.push({
              start: start,
              end: end,
              type: type,
              text: text.slice(start, end)

          }
        }
        return segments;
      }

      function appendAnnotatedTextFragment(parent, text, annotations) {

        for (var i = 0; i < segments.length; i++) {

            parent.appendChild(document.createTextNode(segment.text));
            continue;
          }
          var span = document.createElement('span');
          span.className = 'span-' + segment.type;
          span.setAttribute('data-annotation-type', segment.type);
          span.textContent = segment.type === 'redact' ? '[REDACTED]' : segment.text;
          parent.appendChild(span);
        }
      }

      function renderAnnotatedTextToHtml(text, annotations) {
        var html = [];
        var segments = buildAnnotatedTextSegments(text, annotations);
        for (var i = 0; i < segments.length; i++) {
          var segment = segments[i];
          if (!segment.type) {
            html.push(escapeHtml(segment.text));
          } else if (segment.type === 'redact') {
            html.push('<span class="span-redact" data-annotation-type="redact">[REDACTED]</span>');
          } else {
            html.push('<span class="span-' + escapeHtmlAttribute(segment.type) + '" data-annotation-type="' + escapeHtmlAttribute(segment.type) + '">' + escapeHtml(segment.text) + '</span>');
          }
        }
        return html.join('');

      function renderAnnotatedTextToMarkdown(text, annotations) {

            output.push('[SOFT REDACTED]');
          } else if (segment.type === 'focus') {
            output.push('**' + escapeMarkdownText(segment.text) + '**');
          } else {
            output.push(escapeMarkdownText(segment.text));
          }
        }
        return output.join('');

          parent.normalize();
        }
      }

      function collectConversationSearchTextNodes(section) {
        var nodes = [];
        var containers = section ? section.querySelectorAll('h4, .message-header .author, .message-body .message-search-part') : [];
        for (var i = 0; i < containers.length; i++) {
          var container = containers[i];
          var messageEl = container.closest ? container.closest('.message') : null;
          var messageIndex = messageEl ? Number(messageEl.getAttribute('data-message-index')) : -1;
          var partIndex = container.getAttribute('data-search-part-index');
          var field = container.tagName && container.tagName.toLowerCase() === 'h4'
            ? 'title'
            : (container.classList && container.classList.contains('author') ? 'author' : 'part');
          var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
              return node.nodeValue.trim()
                ? NodeFilter.FILTER_ACCEPT
                : NodeFilter.FILTER_REJECT;
            }
          });
          var node = walker.nextNode();
          while (node) {
            nodes.push({
              node: node,
              messageIndex: messageIndex,
              partIndex: partIndex === null ? -1 : Number(partIndex),
              field: field
            });
            node = walker.nextNode();
          }
        }
        return nodes;
      }

      function addSearchMatchesForEntry(matches, conversation, conversationIndex, entry, query, options) {
        if (!entry || !entry.text) return;
        var foundMatches = findTextMatches(entry.text, query, options);
        for (var i = 0; i < foundMatches.length; i++) {
          matches.push({
            conversationKey: conversation.key,
            conversationIndex: conversationIndex,
            messageIndex: entry.messageIndex,
            field: entry.field,
            partIndex: entry.partIndex,
            start: foundMatches[i].start,
            end: foundMatches[i].end,
            occurrence: i
          });
        }
      }

      function logConversationSearchIndex(stage, query, matchCount) {
        console.info('[Search debug]', {
          stage: stage,
          conversationsIndexed: conversationSearchIndexStats.conversationsIndexed,
          messagesIndexed: conversationSearchIndexStats.messagesIndexed,
          totalSearchableTextLength: conversationSearchIndexStats.totalSearchableTextLength,
          fieldsIncluded: conversationSearchDebugFields,
          queryNormalized: normalizeSearchText(query || ''),
          matchCountBeforePagination: typeof matchCount === 'number' ? matchCount : conversationSearchMatches.length
        });
      }

      function selectConversationSearchMatch(index) {
        if (conversationSearchMatches.length === 0) {
          currentConversationMatchIndex = -1;
          updateConversationSearchControls();
          return;
        }

        currentConversationMatchIndex = (index + conversationSearchMatches.length) % conversationSearchMatches.length;
        pendingConversationMatchIndex = currentConversationMatchIndex;

        var match = conversationSearchMatches[currentConversationMatchIndex];
        if (match && match.conversationKey) {
          activeConversationKey = match.conversationKey;
        }

        var activeIndex = getActiveConversationIndex();
        if (activeIndex < 0 && match && match.conversationKey && searchQuery.trim()) {
          searchQuery = '';
          applyFilters();
          updateSearchControls();
          activeIndex = getActiveConversationIndex();
        }
        if (activeIndex < 0) {
          updateConversationSearchControls();
          return;
        }

        var targetPage = getConversationPageForIndex(activeIndex);
        if (targetPage !== currentPage) {
          currentPage = targetPage;
          var mainArea = document.getElementById('mainArea');
          if (mainArea) mainArea.scrollTo({ top: 0 });
          renderCurrentPageAfterPaint();
          updateConversationSearchControls();
          return;
        }

        activeConversationId = null;
        for (var r = 0; r < renderedConversations.length; r++) {
          if (renderedConversations[r].key === activeConversationKey) {
            activeConversationId = renderedConversations[r].id;
            break;
          }
        }
        highlightVisibleConversationSearchMatches();
        updateConversationSearchControls();
        renderThreadList();
      }

      function runConversationSearch(preferredConversationKey) {
        var root = dom.root || document.getElementById('root');
        clearConversationSearchHighlights(root);
        conversationSearchMatches = [];
        currentConversationMatchIndex = -1;
        pendingConversationMatchIndex = -1;

        var query = conversationSearchQuery.trim();
        conversationSearchLastRunQuery = query;
        if (!query || allConversationsForDisplay.length === 0) {
          updateConversationSearchControls();
          return;
        }

        var searchOptions = {
          caseSensitive: conversationSearchCaseSensitive,
          wholeWord: conversationSearchWholeWord
        };
        var conversations = allConversationsForDisplay;
        for (var c = 0; c < conversations.length; c++) {
          var indexedConversation = conversations[c];
          var searchEntries = indexedConversation.searchEntries || [];
          for (var e = 0; e < searchEntries.length; e++) {
            addSearchMatchesForEntry(conversationSearchMatches, indexedConversation, c, searchEntries[e], query, searchOptions);
          }
        }
        logConversationSearchIndex('query', query, conversationSearchMatches.length);

        if (conversationSearchMatches.length > 0) {
          var initialMatchIndex = 0;
          if (preferredConversationKey) {
            for (var i = 0; i < conversationSearchMatches.length; i++) {
              if (conversationSearchMatches[i].conversationKey === preferredConversationKey) {
                initialMatchIndex = i;
                break;
              }
            }
          }
          selectConversationSearchMatch(initialMatchIndex);
        } else {
          updateConversationSearchControls();
        }
      }

      function highlightVisibleConversationSearchMatches() {
        var root = dom.root || document.getElementById('root');
        clearConversationSearchHighlights(root);
        var query = conversationSearchQuery.trim();
        var section = document.getElementById(activeConversationId);
        if (!query || !section) return;

        var searchOptions = {
          caseSensitive: conversationSearchCaseSensitive,
          wholeWord: conversationSearchWholeWord
        };
        var currentMatch = currentConversationMatchIndex >= 0
          ? conversationSearchMatches[currentConversationMatchIndex]
          : null;
        var textNodes = collectConversationSearchTextNodes(section);
        for (var i = 0; i < textNodes.length; i++) {
          var textNodeInfo = textNodes[i];
          var textNode = textNodeInfo.node;
          var text = textNode.nodeValue;
          var start = 0;
          var visibleMatches = findTextMatches(text, query, searchOptions);
          if (visibleMatches.length === 0) continue;

          var fragment = document.createDocumentFragment();
          for (var matchIndex = 0; matchIndex < visibleMatches.length; matchIndex++) {
            var visibleMatch = visibleMatches[matchIndex];
            var index = visibleMatch.start;
            if (index > start) {
              fragment.appendChild(document.createTextNode(text.slice(start, index)));
            }

            var mark = document.createElement('mark');
            mark.className = 'conversation-search-match';
            mark.textContent = text.slice(visibleMatch.start, visibleMatch.end);
            if (
              currentMatch &&
              currentMatch.conversationKey === activeConversationKey &&
              currentMatch.messageIndex === textNodeInfo.messageIndex &&
              (
                currentMatch.field === textNodeInfo.field ||
                (currentMatch.field === 'authorName' && textNodeInfo.field === 'author')
              ) &&
              currentMatch.partIndex === textNodeInfo.partIndex &&
              currentMatch.occurrence === matchIndex
            ) {
              mark.className += ' current';
            }
            fragment.appendChild(mark);

            start = visibleMatch.end;
          }

          if (start < text.length) {
            fragment.appendChild(document.createTextNode(text.slice(start)));
          }
          textNode.parentNode.replaceChild(fragment, textNode);
        }

        var currentMark = section.querySelector('mark.conversation-search-match.current');
        if (currentMark) {
          currentMark.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
        }
      }

      function setActiveConversation(conversationId) {
        var section = document.getElementById(conversationId);
        var conversationKey = section ? section.getAttribute('data-conversation-key') : '';
        if (!conversationKey) {
          for (var i = 0; i < renderedConversations.length; i++) {
            if (renderedConversations[i].id === conversationId) {
              conversationKey = renderedConversations[i].key;
              break;
            }
          }
        }

        if (conversationId === activeConversationId && conversationKey === activeConversationKey) {
          updateConversationSearchControls();
          return;
        }

        activeConversationId = conversationId;
        activeConversationKey = conversationKey || activeConversationKey;
        conversationSearchMatches = [];
        currentConversationMatchIndex = -1;
        pendingConversationMatchIndex = -1;
        clearConversationSearchHighlights(dom.root || document.getElementById('root'));
        if (conversationSearchQuery.trim()) {
          runConversationSearch(activeConversationKey);
        }
        updateConversationSearchControls();
        renderThreadList();
      }

      function getFilteredConversations() {
        return conversationsForDisplay;
      }

      function getActiveConversationIndex() {
        if (!activeConversationKey) return -1;
        var conversations = getFilteredConversations();
        for (var i = 0; i < conversations.length; i++) {
          if (conversations[i].key === activeConversationKey) return i;
        }
        return -1;
      }

      function getActiveConversation() {
        var index = getActiveConversationIndex();
        return index >= 0 ? getFilteredConversations()[index] : null;
      }

      function getConversationPageForIndex(index) {
        return Math.floor(index / pageSize) + 1;
      }

      function getTotalPages() {
        var total = getFilteredConversations().length;
        return Math.max(1, Math.ceil(total / pageSize));
      }

      function updatePaginationControls() {
        var paginationControls = dom.paginationControls || document.getElementById('paginationControls');
        var pageSizeSelect = dom.pageSizeSelect || document.getElementById('pageSizeSelect');
        var firstPageBtn = dom.firstPageBtn || document.getElementById('firstPageBtn');
        var prevPageBtn = dom.prevPageBtn || document.getElementById('prevPageBtn');
        var nextPageBtn = dom.nextPageBtn || document.getElementById('nextPageBtn');
        var lastPageBtn = dom.lastPageBtn || document.getElementById('lastPageBtn');
        var pageIndicator = dom.pageIndicator || document.getElementById('pageIndicator');
        var pageLoadingIndicator = dom.pageLoadingIndicator || document.getElementById('pageLoadingIndicator');
        var totalConversations = getFilteredConversations().length;
        var totalPages = getTotalPages();
        var hasConversations = totalConversations > 0;

        if (paginationControls) {
          paginationControls.style.display = jsonData.length > 0 ? 'flex' : 'none';
        }
        if (pageSizeSelect) {
          pageSizeSelect.value = String(pageSize);
          pageSizeSelect.disabled = isPageLoading || !hasConversations;
        }
        if (pageLoadingIndicator) {
          pageLoadingIndicator.style.display = isPageLoading ? 'inline' : 'none';
        }
        if (pageIndicator) {
          var start = hasConversations ? ((currentPage - 1) * pageSize) + 1 : 0;
          var end = Math.min(currentPage * pageSize, totalConversations);
          pageIndicator.textContent = hasConversations
            ? 'Page ' + currentPage + ' of ' + totalPages + ' (' + start + '-' + end + ' of ' + totalConversations + ')'
            : 'Page 0 of 0';
        }
        if (firstPageBtn) firstPageBtn.disabled = isPageLoading || !hasConversations || currentPage <= 1;
        if (prevPageBtn) prevPageBtn.disabled = isPageLoading || !hasConversations || currentPage <= 1;
        if (nextPageBtn) nextPageBtn.disabled = isPageLoading || !hasConversations || currentPage >= totalPages;
        if (lastPageBtn) lastPageBtn.disabled = isPageLoading || !hasConversations || currentPage >= totalPages;
      }

      function renderCurrentPageAfterPaint() {
        isPageLoading = true;
        updatePaginationControls();

        scheduleAfterPaint(function() {
          try {
            renderCurrentPage();
          } finally {
            isPageLoading = false;
            updatePaginationControls();
          }
        });
      }

      function applyFiltersAndRenderAfterPaint() {
        isPageLoading = true;
        updatePaginationControls();

        scheduleAfterPaint(function() {
          try {
            applyFilters();
            currentPage = 1;
            renderCurrentPage();
          } finally {
            isPageLoading = false;
            updatePaginationControls();
          }
        });
      }

      function appendMessagePart(body, part, partIndex, messageEdit) {
        if (part.text) {
          var textPart = document.createElement('div');
          textPart.className = 'message-search-part';
          textPart.setAttribute('data-search-part-index', partIndex);
          if (isEditModeActive()) {
            textPart.textContent = part.text;
          } else {
            appendAnnotatedTextFragment(textPart, part.text, getAnnotationsForPart(messageEdit, partIndex, part.text.length));
          }
          body.appendChild(textPart);
          return;
        }

        if (!assetsJson) return;
        if (part.transcript) {
          var transcriptPart = document.createElement('div');
          transcriptPart.className = 'message-search-part';
          transcriptPart.setAttribute('data-search-part-index', partIndex);
          var transcriptText = '[Transcript]: ' + part.transcript;
          if (isEditModeActive()) {
            transcriptPart.textContent = transcriptText;
          } else {
            appendAnnotatedTextFragment(transcriptPart, transcriptText, getAnnotationsForPart(messageEdit, partIndex, transcriptText.length));
          }
          body.appendChild(transcriptPart);
          return;
        }

        if (!part.asset) return;
        var link = resolveAssetUrl(part.asset);
        var filePart = document.createElement('div');
        if (link && isSafeLink(link) && isImageAsset(part.asset, link)) {
          filePart.className = 'message-image-wrap';
          var image = document.createElement('img');
          image.className = 'message-image';
          image.src = link;
          image.alt = 'Image attachment';
          image.loading = 'lazy';
          image.onerror = function() {
            var placeholder = document.createElement('span');
            placeholder.className = 'asset-placeholder';
            placeholder.textContent = '[Image unavailable]';
            if (this.parentNode) this.parentNode.replaceChild(placeholder, this);
          };
          filePart.appendChild(image);
        } else if (isImageAsset(part.asset, link)) {
          filePart.className = 'asset-placeholder';
          filePart.textContent = '[Image unavailable]';
        } else if (link && isSafeLink(link)) {
          filePart.appendChild(document.createTextNode('[File]: '));
          var anchor = document.createElement('a');
          anchor.textContent = link;
          anchor.setAttribute('href', link);
          anchor.setAttribute('target', '_blank');
          anchor.setAttribute('rel', 'noopener noreferrer');
          filePart.appendChild(anchor);
        } else {
          filePart.textContent = '[File]: -Deleted-';
        }
        body.appendChild(filePart);
      }

      function getMessageActionClass(action) {
        if (action === 'redact') return ' edit-redact';
        if (action === 'softRedact') return ' edit-softRedact';
        if (action === 'focus') return ' edit-focus';
        return '';
      }

      function syncMessagePreviewNote(messageEl, messageEdit) {
        if (!messageEl || !messageEdit) return;
        var existing = messageEl.querySelector('.message-preview-note');
        var shouldShow = !!(messageEdit.note && messageEdit.action && messageEdit.action !== 'none');
        if (!shouldShow) {
          if (existing && existing.parentNode) existing.parentNode.removeChild(existing);
          return;
        }
        if (!existing) {
          existing = document.createElement('div');
          existing.className = 'message-preview-note';
          messageEl.appendChild(existing);
        }
        existing.textContent = messageEdit.note;
      }

      function getTextOffsetWithinContainer(container, targetNode, targetOffset) {
        var offset = 0;
        var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null);
        var node = walker.nextNode();
        while (node) {
          if (node === targetNode) return offset + targetOffset;
          offset += node.nodeValue.length;
          node = walker.nextNode();
        }
        return -1;
      }

      function captureCurrentSpanSelection() {
        currentSpanSelection = null;
        var selection = window.getSelection ? window.getSelection() : null;
        if (!selection || selection.rangeCount === 0 || selection.isCollapsed) return;
        var range = selection.getRangeAt(0);
        var startContainer = range.startContainer;
        var endContainer = range.endContainer;
        var startPart = startContainer.parentElement ? startContainer.parentElement.closest('.message-search-part') : null;
        var endPart = endContainer.parentElement ? endContainer.parentElement.closest('.message-search-part') : null;
        if (!startPart || startPart !== endPart) return;
        var messageEl = startPart.closest ? startPart.closest('.message') : null;
        if (!messageEl) return;
        var start = getTextOffsetWithinContainer(startPart, startContainer, range.startOffset);
        var end = getTextOffsetWithinContainer(startPart, endContainer, range.endOffset);
        if (start < 0 || end < 0) return;
        if (end < start) {
          var swap = start;
          start = end;
          end = swap;
        }
        if (end <= start) return;
        currentSpanSelection = {
          conversationKey: messageEl.getAttribute('data-conversation-key'),
          messageKey: messageEl.getAttribute('data-message-key'),
          messageIndex: Number(messageEl.getAttribute('data-message-index')),
          partIndex: Number(startPart.getAttribute('data-search-part-index')),
          start: start,
          end: end,
          text: startPart.textContent.slice(start, end)
        };
        var toolbar = messageEl.querySelector('[data-annotation-toolbar]');
        if (toolbar) toolbar.classList.add('active');
      }

      function hideAnnotationToolbars() {
        var toolbars = document.querySelectorAll('[data-annotation-toolbar]');
        for (var i = 0; i < toolbars.length; i++) {
          toolbars[i].classList.remove('active');
        }
      }

      function addSpanAnnotation(conversationKey, messageKey, annotation) {
        if (!conversationKey || !messageKey || !annotation) return false;
        var messageEdit = getMessageEdit(conversationKey, messageKey);
        if (!Array.isArray(messageEdit.annotations)) messageEdit.annotations = [];
        var normalized = normalizeAnnotation(annotation, Number.MAX_SAFE_INTEGER);
        if (!normalized) return false;
        normalized.id = annotation.id || createAnnotationId();
        normalized.partIndex = Number(annotation.partIndex) || 0;
        normalized.source = annotation.source || 'manual';
        normalized.text = annotation.text || '';
        for (var i = 0; i < messageEdit.annotations.length; i++) {
          var existing = messageEdit.annotations[i];
          if (
            existing &&
            existing.type === normalized.type &&
            Number(existing.partIndex) === normalized.partIndex &&
            Number(existing.start) === normalized.start &&
            Number(existing.end) === normalized.end
          ) {
            return false;
          }
        }
        messageEdit.annotations.push(normalized);
        return true;
      }

      function applyCurrentSpanAnnotation(type) {
        if (!currentSpanSelection || ['redact', 'softRedact', 'focus'].indexOf(type) === -1) return;
        addSpanAnnotation(currentSpanSelection.conversationKey, currentSpanSelection.messageKey, {
          type: type,
          partIndex: currentSpanSelection.partIndex,
          start: currentSpanSelection.start,
          end: currentSpanSelection.end,
          source: 'manual',
          text: currentSpanSelection.text
        });
        currentSpanSelection = null;
        hideAnnotationToolbars();
        setEditStatus('Unsaved edit changes');
        renderCurrentPageAfterPaint();
      }

      function applySearchMatchesAsAnnotations(type) {
        if (['redact', 'softRedact', 'focus'].indexOf(type) === -1) return;
        if (!conversationSearchQuery.trim()) return;
        if (conversationSearchLastRunQuery !== conversationSearchQuery.trim()) {
          runConversationSearch(activeConversationKey);
        }
        var added = 0;
        for (var i = 0; i < conversationSearchMatches.length; i++) {
          var match = conversationSearchMatches[i];
          if (!match || match.field !== 'part' || match.messageIndex < 0 || match.partIndex < 0) continue;
          var conversation = allConversationsForDisplay[match.conversationIndex];
          if (!conversation || !conversation.messages || !conversation.messages[match.messageIndex]) continue;
          var message = conversation.messages[match.messageIndex];
          var messageKey = message.id || ('message-' + match.messageIndex);
          var part = (message.parts || [])[match.partIndex];
          var text = getSearchablePartText(part);
          if (!text) continue;
          if (addSpanAnnotation(conversation.key, messageKey, {
            type: type,
            partIndex: match.partIndex,
            start: match.start,
            end: match.end,
            source: 'search',
            text: text.slice(match.start, match.end)
          })) {
            added++;
          }
        }
        if (added > 0) {
          setEditStatus('Unsaved edit changes');
          renderCurrentPageAfterPaint();
        }
      }

      function renderMessageElement(item, conversationKey, messageIndex) {
        var messageKey = item.id || ('message-' + messageIndex);
        var messageEdit = readMessageEdit(conversationKey, messageKey) || getDefaultMessageEdit();
        var isEditMode = isEditModeActive();
        var message = document.createElement('div');
        var roleClass = '';
        if (item.author === 'user') {
          roleClass = ' user';
        } else if (item.author === 'ChatGPT') {
          roleClass = ' AI';
        }

        message.className = 'message' + roleClass + getMessageActionClass(messageEdit.action);
        message.setAttribute('data-conversation-key', conversationKey);
        message.setAttribute('data-message-key', messageKey);
        message.setAttribute('data-message-index', messageIndex);

        var header = document.createElement('div');
        header.className = 'message-header';

        var author = document.createElement('span');
        author.className = 'author';
        author.textContent = item.author;
        header.appendChild(author);

        var timestamp = document.createElement('span');
        timestamp.className = 'timestamp';
        timestamp.textContent = item.timestamp ? item.timestamp : '';
        header.appendChild(timestamp);

        var model = document.createElement('span');
        model.className = 'model';
        model.textContent = item.model ? item.model : '';
        header.appendChild(model);

        if (isEditMode) {
          var actionWrap = document.createElement('label');
          actionWrap.className = 'message-action message-edit-controls';
          actionWrap.textContent = 'Action';

          var actionSelect = document.createElement('select');
          actionSelect.setAttribute('data-edit-action', 'message-action');
          actionSelect.setAttribute('aria-label', 'Message edit action');
          var actions = ['none', 'redact', 'softRedact', 'focus'];
          for (var a = 0; a < actions.length; a++) {
            var option = document.createElement('option');
            option.value = actions[a];
            option.textContent = actions[a];
            actionSelect.appendChild(option);
          }
          actionSelect.value = messageEdit.action || 'none';
          actionWrap.appendChild(actionSelect);
          header.appendChild(actionWrap);
        }

        message.appendChild(header);

        if (isEditMode) {
          var noteWrap = document.createElement('label');
          noteWrap.className = 'message-note message-edit-controls';
          var noteInput = document.createElement('input');
          noteInput.type = 'text';
          noteInput.placeholder = 'Edit note';
          noteInput.value = messageEdit.note || '';
          noteInput.setAttribute('data-edit-action', 'message-note');
          noteInput.setAttribute('aria-label', 'Message edit note');
          noteWrap.appendChild(noteInput);
          message.appendChild(noteWrap);

          var annotationToolbar = document.createElement('div');
          annotationToolbar.className = 'annotation-toolbar';
          annotationToolbar.setAttribute('data-annotation-toolbar', 'true');
          annotationToolbar.appendChild(document.createTextNode('Selected span:'));
          var annotationActions = [
            { type: 'redact', label: 'Redact' },
            { type: 'softRedact', label: 'Soft redact' },
            { type: 'focus', label: 'Focus' }
          ];
          for (var at = 0; at < annotationActions.length; at++) {
            var annotationButton = document.createElement('button');
            annotationButton.type = 'button';
            annotationButton.textContent = annotationActions[at].label;
            annotationButton.setAttribute('data-edit-action', 'span-annotation');
            annotationButton.setAttribute('data-annotation-type', annotationActions[at].type);
            annotationToolbar.appendChild(annotationButton);
          }
          message.appendChild(annotationToolbar);
        }

        var body = document.createElement('div');
        body.className = 'message-body';
        var parts = item.parts || [];
        for (var i = 0; i < parts.length; i++) {
          appendMessagePart(body, parts[i], i, messageEdit);
        }

        message.appendChild(body);

        if (messageEdit.note && messageEdit.action && messageEdit.action !== 'none') {
          var previewNote = document.createElement('div');
          previewNote.className = 'message-preview-note';
          previewNote.textContent = messageEdit.note;
          message.appendChild(previewNote);
        }

        return message;
      }

      function renderConversationElement(conversation, conversationId, conversationNumber) {
        var currentConversationDiv = document.createElement('div');
        currentConversationDiv.className = 'conversation';
        currentConversationDiv.id = conversationId;
        currentConversationDiv.setAttribute('data-conversation-key', conversation.key);

        var heading = document.createElement('h4');
        heading.textContent = conversationNumber + '. ' + conversation.title;
        currentConversationDiv.appendChild(heading);

        if (isEditModeActive()) {
          var conversationEdit = readConversationEdit(conversation.key) || {};
          var meta = document.createElement('div');
          meta.className = 'conversation-meta publish-edit-container';
          var publishLabel = document.createElement('label');
          publishLabel.className = 'publish-toggle publish-edit-control';
          var publishCheckbox = document.createElement('input');
          publishCheckbox.type = 'checkbox';
          publishCheckbox.setAttribute('data-edit-action', 'conversation-publish');
          publishCheckbox.checked = !!conversationEdit.publish;
          publishLabel.appendChild(publishCheckbox);
          publishLabel.appendChild(document.createTextNode('Publish'));
          meta.appendChild(publishLabel);
          currentConversationDiv.appendChild(meta);
        }

        for (var i = 0; i < conversation.messages.length; i++) {
          currentConversationDiv.appendChild(renderMessageElement(conversation.messages[i], conversation.key, i));
        }

        return currentConversationDiv;
      }

      function renderCurrentPage() {
        var root = dom.root || document.getElementById('root');
        var threadList = dom.threadList || document.getElementById('threadList');
        root.innerHTML = '';
        if (threadList) threadList.innerHTML = '';
        renderedConversations = [];

        var conversations = getFilteredConversations();
        if (conversations.length === 0) {
          clearActiveConversation();
          if (jsonData.length > 0) {
            var emptyState = document.createElement('div');
            emptyState.className = 'empty-state';
            emptyState.textContent = searchQuery.trim()
              ? 'No conversations match your search.'
              : 'No conversations to display.';
            root.appendChild(emptyState);
          }
          updatePaginationControls();
          updateEditsControls();
          updateConversationSearchControls();
          renderThreadList();
          setImportUiState(jsonData.length > 0);
          return;
        }

        setImportUiState(true);
        var totalPages = getTotalPages();
        currentPage = Math.min(Math.max(currentPage, 1), totalPages);
        var startIndex = (currentPage - 1) * pageSize;
        var pageConversations = conversations.slice(startIndex, startIndex + pageSize);
        var pageFragment = document.createDocumentFragment();

        for (var c = 0; c < pageConversations.length; c++) {
          var current = pageConversations[c];
          var conversationIndex = startIndex + c;
          var conversationNumber = conversationIndex + 1;
          var conversationId = 'conversation-' + conversationIndex;
          renderedConversations.push({
            id: conversationId,
            number: conversationNumber,
            key: current.key,
            title: current.title,
            timestampRaw: current.sortTimestampRaw
          });

          pageFragment.appendChild(renderConversationElement(current, conversationId, conversationNumber));
        }
        root.appendChild(pageFragment);

        if (activeConversationKey) {
          activeConversationId = null;
          for (var r = 0; r < renderedConversations.length; r++) {
            if (renderedConversations[r].key === activeConversationKey) {
              activeConversationId = renderedConversations[r].id;
              break;
            }
          }
        }

        if (!activeConversationKey && renderedConversations.length > 0) {
          activeConversationId = renderedConversations[0].id;
          activeConversationKey = renderedConversations[0].key;
        }

        updatePaginationControls();
        updateEditsControls();
        updateSearchControls();
        renderThreadList();
        var activeSearchQuery = conversationSearchQuery.trim();
        if (activeSearchQuery && activeConversationKey) {
          if (conversationSearchMatches.length === 0 && conversationSearchLastRunQuery !== activeSearchQuery) {
            runConversationSearch();
          } else if (activeConversationId) {
            highlightVisibleConversationSearchMatches();
            updateConversationSearchControls();
          } else {
            updateConversationSearchControls();
          }
        } else {
          updateConversationSearchControls();
        }
      }

      function renderData(dataArray, assets, sourceName) {
        resetReaderState();
        assetsJson = assets || {};
        sourceExportName = sourceName || sourceExportName || '';
        editsState = createEmptyEditsState(sourceExportName);
        setEditStatus(sourceExportName ? 'Edits for ' + sourceExportName : '');

        if (!Array.isArray(dataArray) || dataArray.length === 0) {
          renderCurrentPage();
          updateSearchControls();
          return;
        }

        for (var i = 0; i < dataArray.length; i++) {
          var conversation = dataArray[i];
          if (!conversation) continue;
          var normalizedConversation = normalizeConversation(conversation);
          jsonData.push(conversation);
          allConversationsForDisplay.push(normalizedConversation);
          conversationSearchIndexStats.conversationsIndexed++;
          conversationSearchIndexStats.messagesIndexed += normalizedConversation.messages.length;
          conversationSearchIndexStats.totalSearchableTextLength += normalizedConversation.searchTextLength;
        }

        allConversationsForDisplay.sort(function(a, b) {
          return a.sortTimestampRaw - b.sortTimestampRaw;
        });
        logConversationSearchIndex('index-loaded', '', 0);

        applyFilters();
        updateSearchControls();
        renderCurrentPage();
      }

      function normalizeLoadedEdits(loaded) {
        var normalized = createEmptyEditsState((loaded && loaded.sourceExportName) || sourceExportName);
        if (loaded && loaded.version) normalized.version = loaded.version;
        var conversations = (loaded && loaded.conversations) || {};
        for (var conversationKey in conversations) {
          if (!Object.prototype.hasOwnProperty.call(conversations, conversationKey)) continue;
          var loadedConversation = conversations[conversationKey] || {};
          normalized.conversations[conversationKey] = {
            publish: !!loadedConversation.publish,
            messages: {}
          };
          var loadedMessages = loadedConversation.messages || {};
          for (var messageKey in loadedMessages) {
            if (!Object.prototype.hasOwnProperty.call(loadedMessages, messageKey)) continue;
            var loadedMessage = loadedMessages[messageKey] || {};
            var action = loadedMessage.action || 'none';
            if (['none', 'redact', 'softRedact', 'focus'].indexOf(action) === -1) action = 'none';
            var annotations = [];
            var loadedAnnotations = Array.isArray(loadedMessage.annotations) ? loadedMessage.annotations : [];
            for (var ann = 0; ann < loadedAnnotations.length; ann++) {
              var loadedAnnotation = loadedAnnotations[ann] || {};
              var annotationType = loadedAnnotation.type;
              if (['redact', 'softRedact', 'focus'].indexOf(annotationType) === -1) continue;
              var start = Math.max(0, Number(loadedAnnotation.start) || 0);
              var end = Math.max(0, Number(loadedAnnotation.end) || 0);
              if (end <= start) continue;
              annotations.push({
                id: loadedAnnotation.id || createAnnotationId(),
                type: annotationType,
                partIndex: Math.max(0, Number(loadedAnnotation.partIndex) || 0),
                start: start,
                end: end,
                source: loadedAnnotation.source || 'manual',
                text: loadedAnnotation.text || ''
              });
            }
            normalized.conversations[conversationKey].messages[messageKey] = {
              action: action,
              note: loadedMessage.note || '',
              replacement: loadedMessage.replacement || '',
              annotations: annotations
            };
          }
        }
        return normalized;
      }

      function escapeMarkdownText(text) {
        if (typeof text !== 'string') return '';
        return text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
      }

      function markdownLinkTarget(url) {
        if (!url || typeof url !== 'string') return '';
        if (url.indexOf('file://') === 0) {
          try {
            var parsed = new URL(url);
            var pathParts = parsed.pathname.split('/').filter(Boolean);
            var last = pathParts.length ? pathParts[pathParts.length - 1] : '';
            return decodeURIComponent(last || parsed.pathname);
          } catch (e) {
            return url;
          }
        }
        return url;
      }

      function appendMarkdownNote(lines, note) {
        if (!note) return;
        lines.push('');
        lines.push('> Note: ' + escapeMarkdownText(note));
      }

      function renderMessagePartsToMarkdown(parts, messageEdit) {
        var lines = [];
        for (var i = 0; i < parts.length; i++) {
          var part = parts[i];
          if (part.text) {
            var text = renderAnnotatedTextToMarkdown(part.text, getAnnotationsForPart(messageEdit, i, part.text.length));
            if (text) lines.push(text);
          } else if (part.transcript) {
            var transcriptText = '[Transcript]: ' + part.transcript;
            lines.push(renderAnnotatedTextToMarkdown(transcriptText, getAnnotationsForPart(messageEdit, i, transcriptText.length)));
          } else if (part.asset) {
            var link = resolveAssetUrl(part.asset);
            if (isImageAsset(part.asset, link)) {
              if (link) {
                lines.push('![Image attachment](<' + resolveAssetMarkdownTarget(part.asset) + '>)');
              } else {
                lines.push('[Image unavailable]');
              }
            } else if (link) {
              lines.push('[File attachment](<' + resolveAssetMarkdownTarget(part.asset) + '>)');
            } else {
              lines.push('[File unavailable]');
            }
          }
        }
        return lines.join('\n\n');
      }

      function buildPublishedMarkdown() {
        var lines = [];
        lines.push('# Published Threads');
        if (sourceExportName) {
          lines.push('');
          lines.push('_Source: ' + escapeMarkdownText(sourceExportName) + '_');
        }

        var publishedCount = 0;
        for (var i = 0; i < allConversationsForDisplay.length; i++) {
          var conversation = allConversationsForDisplay[i];
          var conversationEdit = readConversationEdit(conversation.key);
          if (!conversationEdit || !conversationEdit.publish) continue;
          publishedCount++;

          lines.push('');
          lines.push('---');
          lines.push('');
          lines.push('## ' + escapeMarkdownText(conversation.title || 'Untitled'));
          lines.push('');
          lines.push('_Date: ' + formatTimestamp(conversation.sortTimestampRaw) + '_');

          for (var m = 0; m < conversation.messages.length; m++) {
            var message = conversation.messages[m];
            var messageKey = message.id || ('message-' + m);
            var messageEdit = readMessageEdit(conversation.key, messageKey) || getDefaultMessageEdit();
            var action = messageEdit.action || 'none';
            var author = message.author || 'message';
            var messageDate = message.timestamp ? ' - ' + message.timestamp : '';

            lines.push('');
            lines.push('### ' + author + messageDate);
            lines.push('');

            if (action === 'redact') {
              lines.push('[REDACTED]');
              appendMarkdownNote(lines, messageEdit.note);
              continue;
            }

            if (action === 'softRedact') {
              lines.push('[SOFT REDACTED]');
              appendMarkdownNote(lines, messageEdit.note);
              continue;
            }

            if (action === 'focus') {
              lines.push('> **FOCUS**');
              lines.push('');
            }

            var body = renderMessagePartsToMarkdown(message.parts || [], messageEdit);
            lines.push(body || '[No renderable content]');
            appendMarkdownNote(lines, messageEdit.note);
          }
        }

        if (publishedCount === 0) return '';
        return lines.join('\n') + '\n';
      }

      function renderPlainTextToHtml(text, annotations) {
        var normalized = typeof text === 'string'
          ? text.replace(/\r\n/g, '\n').replace(/\r/g, '\n')
          : '';
        return '<div class="text-part">' + renderAnnotatedTextToHtml(normalized, annotations || []) + '</div>';
      }

      function renderMessagePartsToHtml(parts, messageEdit) {
        var html = [];
        for (var i = 0; i < parts.length; i++) {
          var part = parts[i];
          if (part.text) {
            html.push(renderPlainTextToHtml(part.text, getAnnotationsForPart(messageEdit, i, part.text.length)));
          } else if (part.transcript) {
            var transcriptText = '[Transcript]: ' + part.transcript;
            html.push('<div class="transcript">' + renderAnnotatedTextToHtml(transcriptText, getAnnotationsForPart(messageEdit, i, transcriptText.length)) + '</div>');
          } else if (part.asset) {
            var link = resolveAssetUrl(part.asset);
            var target = resolveAssetMarkdownTarget(part.asset);
            var safeTarget = target || link;
            if (isImageAsset(part.asset, link)) {
              if (safeTarget) {
                html.push(
                  '<figure class="image-part">' +
                    '<img src="' + escapeHtmlAttribute(safeTarget) + '" alt="Image attachment" loading="lazy">' +
                    '<figcaption>Image attachment</figcaption>' +
                  '</figure>'
                );
              } else {
                html.push('<div class="asset-placeholder">[Image unavailable]</div>');
              }
            } else if (safeTarget) {
              html.push(
                '<div class="file-part">[File]: <a href="' + escapeHtmlAttribute(safeTarget) + '">' +
                  escapeHtml(safeTarget) +
                '</a></div>'
              );
            } else {
              html.push('<div class="asset-placeholder">[File unavailable]</div>');
            }
          }
        }
        return html.join('\n') || '<div class="asset-placeholder">[No renderable content]</div>';
      }

      function renderHtmlNote(note) {
        if (!note) return '';
        return '<aside class="edit-note"><strong>Note:</strong> ' + escapeHtml(note) + '</aside>';
      }

            var className = 'message ' + roleClass;
            if (action === 'redact') className += ' redacted';
            if (action === 'softRedact') className += ' soft-redacted';
            if (action === 'focus') className += ' focus';
            var canRevealSoft = action === 'softRedact' || messageHasAnnotationType(messageEdit, 'softRedact');

            html.push('<article class="' + escapeHtmlAttribute(className) + '"' + (canRevealSoft ? ' onclick="this.classList.toggle(&quot;revealed&quot;)"' : '') + '>');

            html.push(renderMessagePartsToHtml(message.parts || [], messageEdit));
