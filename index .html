<html>
  <head>
    <title>ChatGPT Conversation Reader</title>
    <style>
      :root {
        --rail-width: 64px;
        --sidebar-width: 320px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: 'SF Pro Display', -apple-system-headline, system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: url('./images/background.png') center / cover no-repeat fixed;
        color: #DDD;
        margin: 0;
        text-align: left;
        height: 100vh;
        overflow: hidden;
        
      }

      #appLayout {
        display: flex;
        height: 100vh;
      }

      #leftNav {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: var(--rail-width);
        background: rgba(10, 10, 10, 0.8);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding-top: 16px;
        z-index: 30;
      }

      .nav-icon-btn {
        width: 40px;
        height: 40px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.04);
        color: #DDD;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .nav-icon-btn:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .nav-icon-btn.active {
        background: rgba(255, 255, 255, 0.2);
      }

      .nav-icon-btn svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      #threadSidebar {
        position: fixed;
        top: 0;
        left: var(--rail-width);
        height: 100vh;
        width: var(--sidebar-width);
        background: rgba(18, 18, 18, 0.95);
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        transform: translateX(-100%);
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition: transform 0.2s ease, opacity 0.2s ease, visibility 0s linear 0.2s;
        z-index: 25;
        display: flex;
        flex-direction: column;
      }

      #threadSidebar.open {
        transform: translateX(0);
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transition: transform 0.2s ease, opacity 0.2s ease, visibility 0s linear 0s;
      }

      .sidebar-header {
        padding: 16px;
        font-size: 0.95rem;
        font-weight: 600;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .sidebar-search {
        padding: 10px 12px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      #threadSearchInput {
        width: 100%;
        background: rgba(255, 255, 255, 0.06);
        color: #DDD;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 8px;
        padding: 9px 10px;
        font-size: 0.9rem;
        outline: none;
      }

      #threadSearchInput:focus {
        border-color: rgba(255, 255, 255, 0.32);
        background: rgba(255, 255, 255, 0.09);
      }

      #threadSearchInput::placeholder {
        color: rgba(221, 221, 221, 0.55);
      }

      #threadSearchInput:disabled {
        opacity: 0.45;
      }

      #threadList {
        flex: 1;
        overflow-y: hidden;
        padding: 8px;
      }

      #threadSidebar.open #threadList {
        overflow-y: auto;
      }

      .thread-item {
        width: 100%;
        background: transparent;
        border: none;
        color: #DDD;
        text-align: left;
        padding: 10px 12px;
        border-radius: 8px;
        cursor: pointer;
      }

      .thread-item:hover {
        background: rgba(255, 255, 255, 0.09);
      }

      .thread-item.active {
        background: rgba(255, 255, 255, 0.16);
      }

      .thread-item .title {
        font-size: 0.9rem;
        line-height: 1.25rem;
      }

      .thread-title-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
      }

      .thread-title-row .title {
        flex: 1;
        min-width: 0;
      }

      .thread-item .meta {
        opacity: 0.6;
        font-size: 0.75rem;
        margin-top: 4px;
      }

      #mainArea {
        margin-left: var(--rail-width);
        width: calc(100% - var(--rail-width));
        height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
        transition: margin-left 0.2s ease, width 0.2s ease;
        padding: 20px 20px 96px;
      }

      #mainArea.sidebar-open {
        margin-left: calc(var(--rail-width) + var(--sidebar-width));
        width: calc(100% - (var(--rail-width) + var(--sidebar-width)));
      }

      .content {
        max-width: 960px;
        width: 100%;
        min-height: 100%;
        margin: 0 auto;
        overflow-x: hidden;
      }

      #controls {
        margin-bottom: 12px;
      }

      #paginationControls {
        display: none;
        position: fixed;
        left: var(--rail-width);
        right: 0;
        bottom: 0;
        z-index: 20;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 64px;
        padding: 10px 18px;
        margin-bottom: 0;
        background: rgba(18, 18, 18, 0.9);
        border-top: 1px solid rgba(255, 255, 255, 0.12);
        box-shadow: 0 -8px 24px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(8px);
        color: #DDD;
        transition: left 0.2s ease;
      }

      #mainArea.sidebar-open #paginationControls {
        left: calc(var(--rail-width) + var(--sidebar-width));
      }

      #paginationControls label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.9rem;
        opacity: 0.85;
      }

      #pageSizeSelect {
        background: #222222;
        color: #DDD;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        padding: 7px 8px;
      }

      #paginationControls button {
        background: #222222;
        color: #DDD;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 5px;
        cursor: pointer;
      }

      #paginationControls button:disabled {
        cursor: default;
        opacity: 0.4;
      }

      #pageIndicator {
        min-width: 140px;
        text-align: center;
        font-size: 0.9rem;
        opacity: 0.85;
      }

      #pageLoadingIndicator {
        display: none;
        min-width: 92px;
        font-size: 0.9rem;
        opacity: 0.75;
      }

      #conversationSearchControls {
        display: none;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
        color: #DDD;
      }

      #conversationSearchInput {
        min-width: 240px;
        flex: 1;
        background: #222222;
        color: #DDD;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 5px;
        padding: 8px 10px;
        font-size: 0.9rem;
        outline: none;
      }

      #conversationSearchInput:focus {
        border-color: rgba(255, 255, 255, 0.36);
      }

      #conversationSearchInput:disabled {
        opacity: 0.45;
      }

      #conversationSearchControls button {
        background: #222222;
        color: #DDD;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 5px;
        cursor: pointer;
      }

      #conversationSearchControls button:disabled {
        cursor: default;
        opacity: 0.4;
      }

      #conversationMatchCount {
        min-width: 56px;
        text-align: center;
        font-size: 0.9rem;
        opacity: 0.85;
      }

      #editsControls {
        display: none;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        min-height: 20px;
        margin: 0 0 8px;
        color: #DDD;
      }

      #editsControls button {
        display: none;
        background: #222222;
        color: #DDD;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 5px;
        cursor: pointer;
      }

      #editsStatus {
        font-size: 0.85rem;
        opacity: 0.72;
      }

      .conversation-search-match {
        background: rgba(255, 215, 0, 0.28);
        color: inherit;
        border-radius: 2px;
        padding: 0 1px;
      }

      .conversation-search-match.current {
        background: rgba(255, 215, 0, 0.65);
        outline: 1px solid rgba(255, 255, 255, 0.55);
      }

      .empty-state {
        color: #DDD;
        opacity: 0.75;
        padding: 24px 0;
        text-align: center;
      }

      button {
        padding: 8px 12px;
        font-size: 14px;
      }

      h4 {
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: 0.02em;
        color: #EEE;
        text-align: center;
        margin-bottom: 40px;
      }

      h4::after {
        content: "";
        display: block;
        width: 3em;
        height: 1px;
        background: #DDD;
        opacity: 15%;
        margin: 15px auto 0;
      }

      .conversation-meta {
        display: flex;
        justify-content: center;
        margin-top: -24px;
        margin-bottom: 24px;
      }

      .publish-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
        opacity: 0.82;
      }

      .publish-toggle input {
        accent-color: #DDD;
      }

      .publish-edit-control {
        display: none;
      }

      body.edit-mode .publish-edit-control {
        display: inline-flex;
      }

      .publish-edit-container {
        display: none;
      }

      body.edit-mode .publish-edit-container {
        display: flex;
      }

      #root {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .conversation {
        padding: 20px;
        display: flex;
        flex-direction: column;
        width: 100%;
        min-width: 0;
        background: #222222;
        border-radius: 5px;
        margin-bottom: 20px;
      }

      .message-header {
        font-size: .8rem;
        display: flex;
        justify-content: left;
        align-items: center;
        flex-wrap: wrap;
        opacity: 45%;
        margin-bottom: 6px;
        column-gap: 10px;
      }

      .message-edit-controls {
        display: none;
      }

      body.edit-mode .message-edit-controls {
        display: inline-flex;
      }

      .message-action {
        margin-left: auto;
        align-items: center;
        gap: 6px;
      }

      .message-action select {
        background: #1d1d1d;
        color: #DDD;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 5px;
        padding: 3px 6px;
        font-size: 0.75rem;
      }

      .message-note {
        width: 100%;
        margin: 4px 0 10px;
      }

      body.edit-mode .message-note {
        display: block;
      }

      .message-note input {
        width: 100%;
        background: #1d1d1d;
        color: #DDD;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 5px;
        padding: 6px 8px;
        font-size: 0.8rem;
      }

      body:not(.edit-mode) .message.edit-redact {
        background: rgba(10, 10, 10, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      body:not(.edit-mode) .message.edit-redact .message-body > * {
        display: none;
      }

      body:not(.edit-mode) .message.edit-redact .message-body::after {
        content: "[REDACTED]";
        display: block;
        color: rgba(238, 238, 238, 0.74);
        font-family: system-ui, 'Segoe UI', sans-serif;
        font-size: 0.9rem;
        letter-spacing: 0.08em;
        text-align: center;
        padding: 14px 0;
      }

      body:not(.edit-mode) .message.edit-softRedact {
        cursor: pointer;
        background: rgba(255, 255, 255, 0.035);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      body:not(.edit-mode) .message.edit-softRedact .message-body > * {
        filter: blur(20px);
        user-select: none;
        transition: filter 0.15s ease;
      }

      body:not(.edit-mode) .message.edit-softRedact.soft-redact-revealed .message-body > * {
        filter: none;
        user-select: auto;
      }

      body:not(.edit-mode) .message.edit-softRedact .message-body::after {
        content: "Click to reveal/hide";
        display: block;
        margin-top: 8px;
        font-family: system-ui, 'Segoe UI', sans-serif;
        font-size: 0.78rem;
        color: rgba(221, 221, 221, 0.55);
      }

      body:not(.edit-mode) .message.edit-focus {
        background: rgba(180, 205, 190, 0.08);
        border: 1px solid rgba(190, 220, 205, 0.2);
        box-shadow: inset 3px 0 0 rgba(190, 220, 205, 0.35);
      }

      .message-preview-note {
        display: none;
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        color: rgba(221, 221, 221, 0.58);
        font-family: system-ui, 'Segoe UI', sans-serif;
        font-size: 0.82rem;
        line-height: 1.35;
        letter-spacing: 0;
        white-space: normal;
      }

      body:not(.edit-mode) .message.edit-redact .message-preview-note,
      body:not(.edit-mode) .message.edit-softRedact .message-preview-note,
      body:not(.edit-mode) .message.edit-focus .message-preview-note {
        display: block;
      }

      .message {
        padding: 8px;
        border-radius: 2.5px;
        letter-spacing: 0.02em;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        word-break: break-word;
        margin: 20px 0;
        font-size: 1.1rem;
        opacity: 90%;
      }

      .message.user .message-body {
        color: #abd4ee;
        font-family: "Playpen Sans", cursive;
        font-weight: 300;
        font-style: normal;
      }

      .message.AI .message-body {
        color: #cccc9b;
        font-family: "Play", sans-serif;
        font-weight: 300;
        font-style: normal;
      }

      .message-image-wrap {
        margin: 10px 0;
      }

      .message-image {
        display: block;
        max-width: 100%;
        max-height: 640px;
        width: auto;
        height: auto;
        border-radius: 5px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        object-fit: contain;
        background: rgba(0, 0, 0, 0.18);
      }

      .asset-placeholder {
        display: inline-block;
        margin: 6px 0;
        color: rgba(221, 221, 221, 0.58);
        font-family: system-ui, 'Segoe UI', sans-serif;
        font-size: 0.85rem;
      }

      .author {
        font-weight: bold;
        margin-bottom: 4px;
      }

      .author::first-letter {
        text-transform: uppercase;
      }

      #openFileBtn {
        background: #222222;
        color: #DDD;
        padding: 20px;
        border-radius: 5px;
      }

      /* Loading overlay */
      #loadingOverlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.4);
        z-index: 9999;
      }

      .loading-box {
        background: #fff;
        padding: 18px 22px;
        border-radius: 8px;
        display: flex;
        gap: 12px;
        align-items: center;
        box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      }

      .spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 4px solid #e0e0e0;
        border-top-color: #3b82f6;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .loading-text {
        font-size: 14px;
        color: #111;
      }
    </style>
    <script>
      var jsonData = [];
      var assetsJson = {};
      var allConversationsForDisplay = [];
      var conversationsForDisplay = [];
      var renderedConversations = [];
      var currentPage = 1;
      var pageSize = 25;
      var isPageLoading = false;
      var searchQuery = '';
      var searchDebounceTimer = null;
      var activeConversationId = null;
      var conversationSearchQuery = '';
      var conversationSearchMatches = [];
      var currentConversationMatchIndex = -1;
      var sourceExportName = '';
      var editsState = createEmptyEditsState('');
      var dom = {};

      function showLoading(text) {
        var el = document.getElementById('loadingOverlay');
        if (!el) return;
        el.style.display = 'flex';
        if (text) el.querySelector('.loading-text').textContent = text;
      }

      function hideLoading() {
        var el = document.getElementById('loadingOverlay');
        if (!el) return;
        el.style.display = 'none';
      }

      function cacheDom() {
        dom.controls = document.getElementById('controls');
        dom.root = document.getElementById('root');
        dom.threadList = document.getElementById('threadList');
        dom.threadSearchInput = document.getElementById('threadSearchInput');
        dom.paginationControls = document.getElementById('paginationControls');
        dom.pageSizeSelect = document.getElementById('pageSizeSelect');
        dom.firstPageBtn = document.getElementById('firstPageBtn');
        dom.prevPageBtn = document.getElementById('prevPageBtn');
        dom.nextPageBtn = document.getElementById('nextPageBtn');
        dom.lastPageBtn = document.getElementById('lastPageBtn');
        dom.pageIndicator = document.getElementById('pageIndicator');
        dom.pageLoadingIndicator = document.getElementById('pageLoadingIndicator');
        dom.conversationSearchControls = document.getElementById('conversationSearchControls');
        dom.conversationSearchInput = document.getElementById('conversationSearchInput');
        dom.conversationSearchPrevBtn = document.getElementById('conversationSearchPrevBtn');
        dom.conversationSearchNextBtn = document.getElementById('conversationSearchNextBtn');
        dom.conversationMatchCount = document.getElementById('conversationMatchCount');
        dom.editsControls = document.getElementById('editsControls');
        dom.editsStatus = document.getElementById('editsStatus');
      }

      function scheduleAfterPaint(work) {
        requestAnimationFrame(function() {
          setTimeout(work, 0);
        });
      }

      function createEmptyEditsState(sourceName) {
        return {
          version: 1,
          sourceExportName: sourceName || '',
          conversations: {}
        };
      }

      function getFileNameFromPath(filePath) {
        if (!filePath || typeof filePath !== 'string') return '';
        var normalized = filePath.replace(/\\/g, '/');
        return normalized.split('/').pop() || '';
      }

      function getConversationEdit(conversationKey) {
        if (!editsState || !editsState.conversations) {
          editsState = createEmptyEditsState(sourceExportName);
        }
        if (!editsState.conversations[conversationKey]) {
          editsState.conversations[conversationKey] = {
            publish: false,
            messages: {}
          };
        }
        if (!editsState.conversations[conversationKey].messages) {
          editsState.conversations[conversationKey].messages = {};
        }
        return editsState.conversations[conversationKey];
      }

      function getMessageEdit(conversationKey, messageKey) {
        var conversationEdit = getConversationEdit(conversationKey);
        if (!conversationEdit.messages[messageKey]) {
          conversationEdit.messages[messageKey] = {
            action: 'none',
            note: '',
            replacement: ''
          };
        }
        return conversationEdit.messages[messageKey];
      }

      function setEditStatus(text) {
        var status = dom.editsStatus || document.getElementById('editsStatus');
        if (status) status.textContent = text || '';
      }

      function updateEditsControls() {
        var controls = dom.editsControls || document.getElementById('editsControls');
        if (controls) controls.style.display = jsonData.length > 0 ? 'flex' : 'none';
      }

      function getConversationMessages(conversation) {
        var messages = [];
        if (!conversation || !conversation.mapping || !conversation.current_node) return messages;
        var currentNode = conversation.current_node;
        while (currentNode != null) {
          var node = conversation.mapping[currentNode];
          if (!node) break;
          var metadata = (node && node.message && node.message.metadata) || {};
          if (
            node.message &&
            node.message.content &&
            (
              (node.message.content.parts && node.message.content.parts.length > 0) ||
              (metadata.attachments && metadata.attachments.length > 0)
            ) &&
            (node.message.author.role !== 'system' || metadata.is_user_system_message)
          ) {
            var author = node.message.author.role;
            if (author === 'assistant' || author === 'tool') {
              author = 'ChatGPT';
            } else if (author === 'system' && metadata.is_user_system_message) {
              author = 'Custom user info';
            }

            if (node.message.content.content_type == 'text' || node.message.content.content_type == 'multimodal_text') {
              var parts = [];
              var seenAssetPointers = {};
              var contentParts = node.message.content.parts || [];
              for (var i = 0; i < contentParts.length; i++) {
                var part = contentParts[i];
                if (typeof part === 'string' && part.length > 0) {
                  parts.push({ text: part });
                } else if (part.content_type == 'audio_transcription') {
                  parts.push({ transcript: part.text });
                } else if (part.content_type == 'audio_asset_pointer' || part.content_type == 'image_asset_pointer' || part.content_type == 'video_container_asset_pointer') {
                  parts.push({ asset: part });
                  if (part.asset_pointer) seenAssetPointers[part.asset_pointer] = true;
                } else if (part.content_type == 'real_time_user_audio_video_asset_pointer') {
                  if (part.audio_asset_pointer) {
                    parts.push({ asset: part.audio_asset_pointer });
                  }
                  if (part.video_container_asset_pointer) {
                    parts.push({ asset: part.video_container_asset_pointer });
                  }
                  var frames = part.frames_asset_pointers || [];
                  for (var j = 0; j < frames.length; j++) {
                    parts.push({ asset: frames[j] });
                  }
                }
              }

              var attachments = metadata.attachments || [];
              for (var k = 0; k < attachments.length; k++) {
                var attachment = attachments[k];
                if (!attachment) continue;
                var attachmentPointer = attachment.asset_pointer || attachment.id || attachment.file_id || attachment.name || '';
                var attachmentKey = attachment.asset_pointer || (attachment.id ? 'sediment://' + attachment.id : attachmentPointer);
                var isImageAttachment = attachment.mime_type && attachment.mime_type.indexOf('image/') === 0;
                if (isImageAttachment && attachmentKey && !seenAssetPointers[attachmentKey]) {
                  parts.push({
                    asset: {
                      content_type: 'image_asset_pointer',
                      asset_pointer: attachmentKey,
                      id: attachment.id,
                      name: attachment.name,
                      mime_type: attachment.mime_type,
                      width: attachment.width,
                      height: attachment.height
                    }
                  });
                  seenAssetPointers[attachmentKey] = true;
                }
              }

              if (parts.length > 0) {
                var timestampRaw = Number(node.message.create_time) || 0;
                var model = metadata.model_slug || metadata.model || null;
                var timestamp = timestampRaw
                  ? new Date(timestampRaw * 1000).toLocaleString()
                  : null;

                messages.push({
                  id: (node.message && node.message.id) || currentNode || String(messages.length),
                  author: author,
                  parts: parts,
                  timestamp: timestamp,
                  timestampRaw: timestampRaw,
                  model: model
                });
              }
            }
          }
          currentNode = node.parent;
        }
        return messages.reverse();
      }

      function setImportUiState(hasConversations) {
        var controls = dom.controls || document.getElementById('controls');
        if (controls) controls.style.display = hasConversations ? 'none' : 'block';
        if (window.api && window.api.setImportMenuVisible) {
          window.api.setImportMenuVisible(!!hasConversations);
        }
      }

      function isSafeLink(url) {
        if (typeof url !== 'string' || url.length === 0) return false;
        try {
          var parsed = new URL(url, window.location.href);
          return parsed.protocol === 'http:' || parsed.protocol === 'https:' || parsed.protocol === 'file:';
        } catch (e) {
          return false;
        }
      }

      function mergeAssetMaps() {
        var merged = {};
        for (var i = 0; i < arguments.length; i++) {
          var source = arguments[i] || {};
          for (var key in source) {
            if (Object.prototype.hasOwnProperty.call(source, key)) {
              merged[key] = source[key];
            }
          }
        }
        return merged;
      }

      function getAssetId(asset) {
        if (!asset) return '';
        var pointer = asset.asset_pointer || asset.id || asset.file_id || asset.name || '';
        if (typeof pointer !== 'string') return '';
        return pointer.replace(/^sediment:\/\//, '');
      }

      function resolveAssetUrl(asset) {
        var info = resolveAssetInfo(asset);
        if (!info) return '';
        return typeof info === 'string' ? info : (info.url || '');
      }

      function resolveAssetMarkdownTarget(asset) {
        var info = resolveAssetInfo(asset);
        if (!info) return '';
        if (typeof info === 'string') return markdownLinkTarget(info);
        return info.relativePath || markdownLinkTarget(info.url || '');
      }

      function resolveAssetInfo(asset) {
        if (!asset) return '';
        var pointer = asset.asset_pointer || asset.id || asset.file_id || asset.name || '';
        var assetId = getAssetId(asset);
        var candidates = [
          pointer,
          assetId,
          assetId + '-sanitized',
          asset.name
        ];

        for (var i = 0; i < candidates.length; i++) {
          var candidate = candidates[i];
          if (candidate && assetsJson && assetsJson[candidate]) return assetsJson[candidate];
        }

        return '';
      }

      function isImageAsset(asset, resolvedUrl) {
        if (!asset) return false;
        if (asset.content_type === 'image_asset_pointer') return true;
        if (asset.mime_type && asset.mime_type.indexOf('image/') === 0) return true;
        return /\.(png|jpe?g|webp|gif|bmp|avif)(\?|#|$)/i.test(resolvedUrl || asset.name || asset.asset_pointer || '');
      }

      function formatTimestamp(timestampRaw) {
        if (!timestampRaw) return 'No timestamp';
        return new Date(timestampRaw * 1000).toLocaleString();
      }

      function escapeHtml(text) {
        if (typeof text !== 'string') return '';
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      function escapeHtmlAttribute(text) {
        return escapeHtml(text).replace(/`/g, '&#096;');
      }

      function renderThreadList() {
        var threadList = dom.threadList || document.getElementById('threadList');
        if (!threadList) return;
        threadList.innerHTML = '';
        var fragment = document.createDocumentFragment();
        for (var i = 0; i < renderedConversations.length; i++) {
          var conversation = renderedConversations[i];
          var item = document.createElement('div');
          item.className = 'thread-item';
          if (conversation.id === activeConversationId) {
            item.className += ' active';
          }
          item.setAttribute('role', 'button');
          item.setAttribute('tabindex', '0');
          item.setAttribute('data-target-id', conversation.id);

          var titleRow = document.createElement('div');
          titleRow.className = 'thread-title-row';

          var publishLabel = document.createElement('label');
          publishLabel.className = 'publish-toggle publish-edit-control';
          var publishCheckbox = document.createElement('input');
          publishCheckbox.type = 'checkbox';
          publishCheckbox.setAttribute('data-edit-action', 'thread-conversation-publish');
          publishCheckbox.setAttribute('data-conversation-key', conversation.key);
          publishCheckbox.checked = !!getConversationEdit(conversation.key).publish;
          publishLabel.appendChild(publishCheckbox);
          titleRow.appendChild(publishLabel);

          var title = document.createElement('div');
          title.className = 'title';
          title.textContent = conversation.number + '. ' + conversation.title;
          titleRow.appendChild(title);
          item.appendChild(titleRow);

          var meta = document.createElement('div');
          meta.className = 'meta';
          meta.textContent = formatTimestamp(conversation.timestampRaw);
          item.appendChild(meta);
          fragment.appendChild(item);
        }
        threadList.appendChild(fragment);
      }

      function updateSearchControls() {
        var searchInput = dom.threadSearchInput || document.getElementById('threadSearchInput');
        if (!searchInput) return;
        searchInput.disabled = jsonData.length === 0;
        if (searchInput.value !== searchQuery) {
          searchInput.value = searchQuery;
        }
      }

      function buildConversationSearchText(title, messages) {
        var parts = [title || ''];
        for (var i = 0; i < messages.length; i++) {
          var messageParts = messages[i].parts || [];
          for (var j = 0; j < messageParts.length; j++) {
            if (messageParts[j].text) {
              parts.push(messageParts[j].text);
            } else if (messageParts[j].transcript) {
              parts.push(messageParts[j].transcript);
            }
          }
        }
        return parts.join('\n').toLowerCase();
      }

      function normalizeConversation(conversation) {
        var messages = getConversationMessages(conversation);
        var conversationTitle = conversation.title || 'Untitled';
        var conversationKey = conversation.conversation_id || conversation.id || conversationTitle;
        var firstMessageTs = messages.length > 0 ? (Number(messages[0].timestampRaw) || 0) : 0;
        var fallbackTs = Number(conversation.create_time) || Number(conversation.update_time) || 0;
        var sortTs = firstMessageTs || fallbackTs;

        return {
          title: conversationTitle,
          key: conversationKey,
          sortTimestampRaw: sortTs,
          messages: messages,
          searchText: buildConversationSearchText(conversationTitle, messages)
        };
      }

      function applyFilters() {
        var query = searchQuery.trim().toLowerCase();
        if (!query) {
          conversationsForDisplay = allConversationsForDisplay;
          return;
        }
        conversationsForDisplay = allConversationsForDisplay.filter(function(conversation) {
          return conversation.searchText.indexOf(query) !== -1;
        });
      }

      function resetConversationSearch() {
        conversationSearchQuery = '';
        conversationSearchMatches = [];
        currentConversationMatchIndex = -1;
        clearConversationSearchHighlights(dom.root || document.getElementById('root'));
      }

      function clearActiveConversation() {
        activeConversationId = null;
        resetConversationSearch();
      }

      function resetReaderState() {
        jsonData = [];
        allConversationsForDisplay = [];
        conversationsForDisplay = [];
        renderedConversations = [];
        currentPage = 1;
        searchQuery = '';
        clearActiveConversation();
        if (searchDebounceTimer) {
          clearTimeout(searchDebounceTimer);
          searchDebounceTimer = null;
        }
        updateEditsControls();
      }

      function updateConversationSearchControls() {
        var controls = dom.conversationSearchControls || document.getElementById('conversationSearchControls');
        var input = dom.conversationSearchInput || document.getElementById('conversationSearchInput');
        var prevBtn = dom.conversationSearchPrevBtn || document.getElementById('conversationSearchPrevBtn');
        var nextBtn = dom.conversationSearchNextBtn || document.getElementById('conversationSearchNextBtn');
        var matchCount = dom.conversationMatchCount || document.getElementById('conversationMatchCount');
        var hasActiveConversation = !!document.getElementById(activeConversationId);
        var hasMatches = conversationSearchMatches.length > 0;

        if (controls) {
          controls.style.display = jsonData.length > 0 ? 'flex' : 'none';
        }
        if (input) {
          input.disabled = !hasActiveConversation;
          if (input.value !== conversationSearchQuery) {
            input.value = conversationSearchQuery;
          }
        }
        if (matchCount) {
          matchCount.textContent = hasMatches
            ? (currentConversationMatchIndex + 1) + ' of ' + conversationSearchMatches.length
            : '0 of 0';
        }
        if (prevBtn) prevBtn.disabled = !hasMatches;
        if (nextBtn) nextBtn.disabled = !hasMatches;
      }

      function clearConversationSearchHighlights(scope) {
        if (!scope) return;
        var marks = scope.querySelectorAll('mark.conversation-search-match');
        for (var i = marks.length - 1; i >= 0; i--) {
          var mark = marks[i];
          var parent = mark.parentNode;
          if (!parent) continue;
          parent.replaceChild(document.createTextNode(mark.textContent), mark);
          parent.normalize();
        }
      }

      function collectConversationSearchTextNodes(section) {
        var nodes = [];
        var bodies = section ? section.querySelectorAll('.message-body') : [];
        for (var i = 0; i < bodies.length; i++) {
          var walker = document.createTreeWalker(bodies[i], NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
              return node.nodeValue.trim()
                ? NodeFilter.FILTER_ACCEPT
                : NodeFilter.FILTER_REJECT;
            }
          });
          var node = walker.nextNode();
          while (node) {
            nodes.push(node);
            node = walker.nextNode();
          }
        }
        return nodes;
      }

      function selectConversationSearchMatch(index) {
        if (conversationSearchMatches.length === 0) {
          currentConversationMatchIndex = -1;
          updateConversationSearchControls();
          return;
        }

        if (currentConversationMatchIndex >= 0 && conversationSearchMatches[currentConversationMatchIndex]) {
          conversationSearchMatches[currentConversationMatchIndex].classList.remove('current');
        }
        currentConversationMatchIndex = (index + conversationSearchMatches.length) % conversationSearchMatches.length;
        var currentMatch = conversationSearchMatches[currentConversationMatchIndex];
        currentMatch.classList.add('current');
        currentMatch.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'nearest' });
        updateConversationSearchControls();
      }

      function runConversationSearch() {
        var root = dom.root || document.getElementById('root');
        clearConversationSearchHighlights(root);
        conversationSearchMatches = [];
        currentConversationMatchIndex = -1;

        var query = conversationSearchQuery.trim();
        var section = document.getElementById(activeConversationId);
        if (!query || !section) {
          updateConversationSearchControls();
          return;
        }

        var queryLower = query.toLowerCase();
        var textNodes = collectConversationSearchTextNodes(section);
        for (var i = 0; i < textNodes.length; i++) {
          var textNode = textNodes[i];
          var text = textNode.nodeValue;
          var textLower = text.toLowerCase();
          var start = 0;
          var index = textLower.indexOf(queryLower, start);
          if (index === -1) continue;

          var fragment = document.createDocumentFragment();
          while (index !== -1) {
            if (index > start) {
              fragment.appendChild(document.createTextNode(text.slice(start, index)));
            }

            var mark = document.createElement('mark');
            mark.className = 'conversation-search-match';
            mark.textContent = text.slice(index, index + query.length);
            fragment.appendChild(mark);
            conversationSearchMatches.push(mark);

            start = index + query.length;
            index = textLower.indexOf(queryLower, start);
          }

          if (start < text.length) {
            fragment.appendChild(document.createTextNode(text.slice(start)));
          }
          textNode.parentNode.replaceChild(fragment, textNode);
        }

        if (conversationSearchMatches.length > 0) {
          selectConversationSearchMatch(0);
        } else {
          updateConversationSearchControls();
        }
      }

      function setActiveConversation(conversationId) {
        if (conversationId === activeConversationId) {
          updateConversationSearchControls();
          return;
        }

        activeConversationId = conversationId;
        resetConversationSearch();
        updateConversationSearchControls();
        renderThreadList();
      }

      function getFilteredConversations() {
        return conversationsForDisplay;
      }

      function getTotalPages() {
        var total = getFilteredConversations().length;
        return Math.max(1, Math.ceil(total / pageSize));
      }

      function updatePaginationControls() {
        var paginationControls = dom.paginationControls || document.getElementById('paginationControls');
        var pageSizeSelect = dom.pageSizeSelect || document.getElementById('pageSizeSelect');
        var firstPageBtn = dom.firstPageBtn || document.getElementById('firstPageBtn');
        var prevPageBtn = dom.prevPageBtn || document.getElementById('prevPageBtn');
        var nextPageBtn = dom.nextPageBtn || document.getElementById('nextPageBtn');
        var lastPageBtn = dom.lastPageBtn || document.getElementById('lastPageBtn');
        var pageIndicator = dom.pageIndicator || document.getElementById('pageIndicator');
        var pageLoadingIndicator = dom.pageLoadingIndicator || document.getElementById('pageLoadingIndicator');
        var totalConversations = getFilteredConversations().length;
        var totalPages = getTotalPages();
        var hasConversations = totalConversations > 0;

        if (paginationControls) {
          paginationControls.style.display = jsonData.length > 0 ? 'flex' : 'none';
        }
        if (pageSizeSelect) {
          pageSizeSelect.value = String(pageSize);
          pageSizeSelect.disabled = isPageLoading || !hasConversations;
        }
        if (pageLoadingIndicator) {
          pageLoadingIndicator.style.display = isPageLoading ? 'inline' : 'none';
        }
        if (pageIndicator) {
          var start = hasConversations ? ((currentPage - 1) * pageSize) + 1 : 0;
          var end = Math.min(currentPage * pageSize, totalConversations);
          pageIndicator.textContent = hasConversations
            ? 'Page ' + currentPage + ' of ' + totalPages + ' (' + start + '-' + end + ' of ' + totalConversations + ')'
            : 'Page 0 of 0';
        }
        if (firstPageBtn) firstPageBtn.disabled = isPageLoading || !hasConversations || currentPage <= 1;
        if (prevPageBtn) prevPageBtn.disabled = isPageLoading || !hasConversations || currentPage <= 1;
        if (nextPageBtn) nextPageBtn.disabled = isPageLoading || !hasConversations || currentPage >= totalPages;
        if (lastPageBtn) lastPageBtn.disabled = isPageLoading || !hasConversations || currentPage >= totalPages;
      }

      function renderCurrentPageAfterPaint() {
        isPageLoading = true;
        updatePaginationControls();

        scheduleAfterPaint(function() {
          try {
            renderCurrentPage();
          } finally {
            isPageLoading = false;
            updatePaginationControls();
          }
        });
      }

      function applyFiltersAndRenderAfterPaint() {
        isPageLoading = true;
        updatePaginationControls();

        scheduleAfterPaint(function() {
          try {
            applyFilters();
            currentPage = 1;
            renderCurrentPage();
          } finally {
            isPageLoading = false;
            updatePaginationControls();
          }
        });
      }

      function appendMessagePart(body, part) {
        if (part.text) {
          var textPart = document.createElement('div');
          textPart.textContent = part.text;
          body.appendChild(textPart);
          return;
        }

        if (!assetsJson) return;
        if (part.transcript) {
          var transcriptPart = document.createElement('div');
          transcriptPart.textContent = '[Transcript]: ' + part.transcript;
          body.appendChild(transcriptPart);
          return;
        }

        if (!part.asset) return;
        var link = resolveAssetUrl(part.asset);
        var filePart = document.createElement('div');
        if (link && isSafeLink(link) && isImageAsset(part.asset, link)) {
          filePart.className = 'message-image-wrap';
          var image = document.createElement('img');
          image.className = 'message-image';
          image.src = link;
          image.alt = 'Image attachment';
          image.loading = 'lazy';
          image.onerror = function() {
            var placeholder = document.createElement('span');
            placeholder.className = 'asset-placeholder';
            placeholder.textContent = '[Image unavailable]';
            if (this.parentNode) this.parentNode.replaceChild(placeholder, this);
          };
          filePart.appendChild(image);
        } else if (isImageAsset(part.asset, link)) {
          filePart.className = 'asset-placeholder';
          filePart.textContent = '[Image unavailable]';
        } else if (link && isSafeLink(link)) {
          filePart.appendChild(document.createTextNode('[File]: '));
          var anchor = document.createElement('a');
          anchor.textContent = link;
          anchor.setAttribute('href', link);
          anchor.setAttribute('target', '_blank');
          anchor.setAttribute('rel', 'noopener noreferrer');
          filePart.appendChild(anchor);
        } else {
          filePart.textContent = '[File]: -Deleted-';
        }
        body.appendChild(filePart);
      }

      function getMessageActionClass(action) {
        if (action === 'redact') return ' edit-redact';
        if (action === 'softRedact') return ' edit-softRedact';
        if (action === 'focus') return ' edit-focus';
        return '';
      }

      function syncMessagePreviewNote(messageEl, messageEdit) {
        if (!messageEl || !messageEdit) return;
        var existing = messageEl.querySelector('.message-preview-note');
        var shouldShow = !!(messageEdit.note && messageEdit.action && messageEdit.action !== 'none');
        if (!shouldShow) {
          if (existing && existing.parentNode) existing.parentNode.removeChild(existing);
          return;
        }
        if (!existing) {
          existing = document.createElement('div');
          existing.className = 'message-preview-note';
          messageEl.appendChild(existing);
        }
        existing.textContent = messageEdit.note;
      }

      function renderMessageElement(item, conversationKey, messageIndex) {
        var messageKey = item.id || ('message-' + messageIndex);
        var messageEdit = getMessageEdit(conversationKey, messageKey);
        var message = document.createElement('div');
        var roleClass = '';
        if (item.author === 'user') {
          roleClass = ' user';
        } else if (item.author === 'ChatGPT') {
          roleClass = ' AI';
        }

        message.className = 'message' + roleClass + getMessageActionClass(messageEdit.action);
        message.setAttribute('data-conversation-key', conversationKey);
        message.setAttribute('data-message-key', messageKey);

        var header = document.createElement('div');
        header.className = 'message-header';

        var author = document.createElement('span');
        author.className = 'author';
        author.textContent = item.author;
        header.appendChild(author);

        var timestamp = document.createElement('span');
        timestamp.className = 'timestamp';
        timestamp.textContent = item.timestamp ? item.timestamp : '';
        header.appendChild(timestamp);

        var model = document.createElement('span');
        model.className = 'model';
        model.textContent = item.model ? item.model : '';
        header.appendChild(model);

        var actionWrap = document.createElement('label');
        actionWrap.className = 'message-action message-edit-controls';
        actionWrap.textContent = 'Action';

        var actionSelect = document.createElement('select');
        actionSelect.setAttribute('data-edit-action', 'message-action');
        actionSelect.setAttribute('aria-label', 'Message edit action');
        var actions = ['none', 'redact', 'softRedact', 'focus'];
        for (var a = 0; a < actions.length; a++) {
          var option = document.createElement('option');
          option.value = actions[a];
          option.textContent = actions[a];
          actionSelect.appendChild(option);
        }
        actionSelect.value = messageEdit.action || 'none';
        actionWrap.appendChild(actionSelect);
        header.appendChild(actionWrap);

        message.appendChild(header);

        var noteWrap = document.createElement('label');
        noteWrap.className = 'message-note message-edit-controls';
        var noteInput = document.createElement('input');
        noteInput.type = 'text';
        noteInput.placeholder = 'Edit note';
        noteInput.value = messageEdit.note || '';
        noteInput.setAttribute('data-edit-action', 'message-note');
        noteInput.setAttribute('aria-label', 'Message edit note');
        noteWrap.appendChild(noteInput);
        message.appendChild(noteWrap);

        var body = document.createElement('div');
        body.className = 'message-body';
        var parts = item.parts || [];
        for (var i = 0; i < parts.length; i++) {
          appendMessagePart(body, parts[i]);
        }

        message.appendChild(body);

        if (messageEdit.note && messageEdit.action && messageEdit.action !== 'none') {
          var previewNote = document.createElement('div');
          previewNote.className = 'message-preview-note';
          previewNote.textContent = messageEdit.note;
          message.appendChild(previewNote);
        }

        return message;
      }

      function renderConversationElement(conversation, conversationId, conversationNumber) {
        var currentConversationDiv = document.createElement('div');
        currentConversationDiv.className = 'conversation';
        currentConversationDiv.id = conversationId;
        currentConversationDiv.setAttribute('data-conversation-key', conversation.key);

        var heading = document.createElement('h4');
        heading.textContent = conversationNumber + '. ' + conversation.title;
        currentConversationDiv.appendChild(heading);

        var conversationEdit = getConversationEdit(conversation.key);
        var meta = document.createElement('div');
        meta.className = 'conversation-meta publish-edit-container';
        var publishLabel = document.createElement('label');
        publishLabel.className = 'publish-toggle publish-edit-control';
        var publishCheckbox = document.createElement('input');
        publishCheckbox.type = 'checkbox';
        publishCheckbox.setAttribute('data-edit-action', 'conversation-publish');
        publishCheckbox.checked = !!conversationEdit.publish;
        publishLabel.appendChild(publishCheckbox);
        publishLabel.appendChild(document.createTextNode('Publish'));
        meta.appendChild(publishLabel);
        currentConversationDiv.appendChild(meta);

        for (var i = 0; i < conversation.messages.length; i++) {
          currentConversationDiv.appendChild(renderMessageElement(conversation.messages[i], conversation.key, i));
        }

        return currentConversationDiv;
      }

      function renderCurrentPage() {
        var root = dom.root || document.getElementById('root');
        var threadList = dom.threadList || document.getElementById('threadList');
        root.innerHTML = '';
        if (threadList) threadList.innerHTML = '';
        renderedConversations = [];

        var conversations = getFilteredConversations();
        if (conversations.length === 0) {
          clearActiveConversation();
          if (jsonData.length > 0) {
            var emptyState = document.createElement('div');
            emptyState.className = 'empty-state';
            emptyState.textContent = searchQuery.trim()
              ? 'No conversations match your search.'
              : 'No conversations to display.';
            root.appendChild(emptyState);
          }
          updatePaginationControls();
          updateEditsControls();
          updateConversationSearchControls();
          renderThreadList();
          setImportUiState(jsonData.length > 0);
          return;
        }

        setImportUiState(true);
        var totalPages = getTotalPages();
        currentPage = Math.min(Math.max(currentPage, 1), totalPages);
        var startIndex = (currentPage - 1) * pageSize;
        var pageConversations = conversations.slice(startIndex, startIndex + pageSize);
        var pageFragment = document.createDocumentFragment();

        for (var c = 0; c < pageConversations.length; c++) {
          var current = pageConversations[c];
          var conversationNumber = startIndex + c + 1;
          var conversationId = 'conversation-' + (conversationNumber - 1);
          renderedConversations.push({
            id: conversationId,
            number: conversationNumber,
            key: current.key,
            title: current.title,
            timestampRaw: current.sortTimestampRaw
          });

          pageFragment.appendChild(renderConversationElement(current, conversationId, conversationNumber));
        }
        root.appendChild(pageFragment);

        if (!document.getElementById(activeConversationId) && renderedConversations.length > 0) {
          activeConversationId = renderedConversations[0].id;
          resetConversationSearch();
        }

        updatePaginationControls();
        updateEditsControls();
        updateSearchControls();
        renderThreadList();
        if (conversationSearchQuery.trim()) {
          runConversationSearch();
        } else {
          updateConversationSearchControls();
        }
      }

      function renderData(dataArray, assets, sourceName) {
        resetReaderState();
        assetsJson = assets || {};
        sourceExportName = sourceName || sourceExportName || '';
        editsState = createEmptyEditsState(sourceExportName);
        setEditStatus(sourceExportName ? 'Edits for ' + sourceExportName : '');

        if (!Array.isArray(dataArray) || dataArray.length === 0) {
          renderCurrentPage();
          updateSearchControls();
          return;
        }

        for (var i = 0; i < dataArray.length; i++) {
          var conversation = dataArray[i];
          if (!conversation) continue;
          jsonData.push(conversation);
          allConversationsForDisplay.push(normalizeConversation(conversation));
        }

        allConversationsForDisplay.sort(function(a, b) {
          return a.sortTimestampRaw - b.sortTimestampRaw;
        });

        applyFilters();
        updateSearchControls();
        renderCurrentPage();
      }

      function normalizeLoadedEdits(loaded) {
        var normalized = createEmptyEditsState((loaded && loaded.sourceExportName) || sourceExportName);
        if (loaded && loaded.version) normalized.version = loaded.version;
        var conversations = (loaded && loaded.conversations) || {};
        for (var conversationKey in conversations) {
          if (!Object.prototype.hasOwnProperty.call(conversations, conversationKey)) continue;
          var loadedConversation = conversations[conversationKey] || {};
          normalized.conversations[conversationKey] = {
            publish: !!loadedConversation.publish,
            messages: {}
          };
          var loadedMessages = loadedConversation.messages || {};
          for (var messageKey in loadedMessages) {
            if (!Object.prototype.hasOwnProperty.call(loadedMessages, messageKey)) continue;
            var loadedMessage = loadedMessages[messageKey] || {};
            var action = loadedMessage.action || 'none';
            if (['none', 'redact', 'softRedact', 'focus'].indexOf(action) === -1) action = 'none';
            normalized.conversations[conversationKey].messages[messageKey] = {
              action: action,
              note: loadedMessage.note || '',
              replacement: loadedMessage.replacement || ''
            };
          }
        }
        return normalized;
      }

      async function saveEditsToFile() {
        if (!window.api || !window.api.saveEdits) {
          alert('Save edits API not available');
          return;
        }
        editsState.sourceExportName = sourceExportName || editsState.sourceExportName || '';
        var res = await window.api.saveEdits(editsState);
        if (!res) return;
        if (res.error) {
          alert('Error saving edits: ' + res.error);
          return;
        }
        setEditStatus('Saved ' + getFileNameFromPath(res.filePath));
      }

      async function loadEditsFromFile() {
        if (!window.api || !window.api.loadEdits) {
          alert('Load edits API not available');
          return;
        }
        var res = await window.api.loadEdits();
        if (!res) return;
        if (res.error) {
          alert('Error loading edits: ' + res.error);
          return;
        }
        editsState = normalizeLoadedEdits(res.data);
        if (!sourceExportName && editsState.sourceExportName) {
          sourceExportName = editsState.sourceExportName;
        }
        setEditStatus('Loaded ' + getFileNameFromPath(res.filePath));
        renderCurrentPageAfterPaint();
      }

      function escapeMarkdownText(text) {
        if (typeof text !== 'string') return '';
        return text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
      }

      function markdownLinkTarget(url) {
        if (!url || typeof url !== 'string') return '';
        if (url.indexOf('file://') === 0) {
          try {
            var parsed = new URL(url);
            var pathParts = parsed.pathname.split('/').filter(Boolean);
            var last = pathParts.length ? pathParts[pathParts.length - 1] : '';
            return decodeURIComponent(last || parsed.pathname);
          } catch (e) {
            return url;
          }
        }
        return url;
      }

      function appendMarkdownNote(lines, note) {
        if (!note) return;
        lines.push('');
        lines.push('> Note: ' + escapeMarkdownText(note));
      }

      function renderMessagePartsToMarkdown(parts) {
        var lines = [];
        for (var i = 0; i < parts.length; i++) {
          var part = parts[i];
          if (part.text) {
            var text = escapeMarkdownText(part.text);
            if (text) lines.push(text);
          } else if (part.transcript) {
            lines.push('[Transcript]: ' + escapeMarkdownText(part.transcript));
          } else if (part.asset) {
            var link = resolveAssetUrl(part.asset);
            if (isImageAsset(part.asset, link)) {
              if (link) {
                lines.push('![Image attachment](<' + resolveAssetMarkdownTarget(part.asset) + '>)');
              } else {
                lines.push('[Image unavailable]');
              }
            } else if (link) {
              lines.push('[File attachment](<' + resolveAssetMarkdownTarget(part.asset) + '>)');
            } else {
              lines.push('[File unavailable]');
            }
          }
        }
        return lines.join('\n\n');
      }

      function buildPublishedMarkdown() {
        var lines = [];
        lines.push('# Published Threads');
        if (sourceExportName) {
          lines.push('');
          lines.push('_Source: ' + escapeMarkdownText(sourceExportName) + '_');
        }

        var publishedCount = 0;
        for (var i = 0; i < allConversationsForDisplay.length; i++) {
          var conversation = allConversationsForDisplay[i];
          var conversationEdit = getConversationEdit(conversation.key);
          if (!conversationEdit.publish) continue;
          publishedCount++;

          lines.push('');
          lines.push('---');
          lines.push('');
          lines.push('## ' + escapeMarkdownText(conversation.title || 'Untitled'));
          lines.push('');
          lines.push('_Date: ' + formatTimestamp(conversation.sortTimestampRaw) + '_');

          for (var m = 0; m < conversation.messages.length; m++) {
            var message = conversation.messages[m];
            var messageKey = message.id || ('message-' + m);
            var messageEdit = getMessageEdit(conversation.key, messageKey);
            var action = messageEdit.action || 'none';
            var author = message.author || 'message';
            var messageDate = message.timestamp ? ' - ' + message.timestamp : '';

            lines.push('');
            lines.push('### ' + author + messageDate);
            lines.push('');

            if (action === 'redact') {
              lines.push('[REDACTED]');
              appendMarkdownNote(lines, messageEdit.note);
              continue;
            }

            if (action === 'softRedact') {
              lines.push('[SOFT REDACTED]');
              appendMarkdownNote(lines, messageEdit.note);
              continue;
            }

            if (action === 'focus') {
              lines.push('> **FOCUS**');
              lines.push('');
            }

            var body = renderMessagePartsToMarkdown(message.parts || []);
            lines.push(body || '[No renderable content]');
            appendMarkdownNote(lines, messageEdit.note);
          }
        }

        if (publishedCount === 0) return '';
        return lines.join('\n') + '\n';
      }

      function renderPlainTextToHtml(text) {
        var normalized = typeof text === 'string'
          ? text.replace(/\r\n/g, '\n').replace(/\r/g, '\n')
          : '';
        return '<div class="text-part">' + escapeHtml(normalized) + '</div>';
      }

      function renderMessagePartsToHtml(parts) {
        var html = [];
        for (var i = 0; i < parts.length; i++) {
          var part = parts[i];
          if (part.text) {
            html.push(renderPlainTextToHtml(part.text));
          } else if (part.transcript) {
            html.push('<div class="transcript"><span>[Transcript]</span> ' + escapeHtml(part.transcript) + '</div>');
          } else if (part.asset) {
            var link = resolveAssetUrl(part.asset);
            var target = resolveAssetMarkdownTarget(part.asset);
            var safeTarget = target || link;
            if (isImageAsset(part.asset, link)) {
              if (safeTarget) {
                html.push(
                  '<figure class="image-part">' +
                    '<img src="' + escapeHtmlAttribute(safeTarget) + '" alt="Image attachment" loading="lazy">' +
                    '<figcaption>Image attachment</figcaption>' +
                  '</figure>'
                );
              } else {
                html.push('<div class="asset-placeholder">[Image unavailable]</div>');
              }
            } else if (safeTarget) {
              html.push(
                '<div class="file-part">[File]: <a href="' + escapeHtmlAttribute(safeTarget) + '">' +
                  escapeHtml(safeTarget) +
                '</a></div>'
              );
            } else {
              html.push('<div class="asset-placeholder">[File unavailable]</div>');
            }
          }
        }
        return html.join('\n') || '<div class="asset-placeholder">[No renderable content]</div>';
      }

      function renderHtmlNote(note) {
        if (!note) return '';
        return '<aside class="edit-note"><strong>Note:</strong> ' + escapeHtml(note) + '</aside>';
      }

      function buildPublishedHtml() {

        html.push('.message-header{display:flex;gap:10px;align-items:baseline;flex-wrap:wrap;margin-bottom:10px;}');
        html.push('.role{font-weight:700;text-transform:capitalize;}.message-body{white-space:pre-wrap;overflow-wrap:anywhere;}');
        html.push('.text-part+.text-part,.text-part+.image-part,.image-part+.text-part,.file-part+.text-part{margin-top:12px;}');
        html.push('.image-part{margin:12px 0 0;}.image-part img{display:block;max-width:100%;height:auto;border-radius:6px;border:1px solid #d8d1c4;}.image-part figcaption{font-size:12px;color:#65707d;margin-top:4px;}');
