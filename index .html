<html>
  <head>
    <title>ChatGPT Data Export Reader</title>
    <style>
      body {
        margin: 20px;
        font-family: sans-serif;
      }
      #controls {
        margin-bottom: 12px;
      }
      button {
        padding: 8px 12px;
        font-size: 14px;
      }
      h4 {
        margin: 0;
      }
      #root {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .conversation {
        border: 1px solid black;
        padding: 20px;
        background-color: #f3f3f3;
      }
      .message {
        white-space: pre-wrap;
        margin: 20px 0;
      }
      .author {
        font-weight: bold;
        margin-bottom: 4px;
      }
      .author::first-letter {
        text-transform: uppercase;
      }
      /* Loading overlay */
      #loadingOverlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.4);
        z-index: 9999;
      }
      .loading-box {
        background: #fff;
        padding: 18px 22px;
        border-radius: 8px;
        display: flex;
        gap: 12px;
        align-items: center;
        box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      }
      .spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 4px solid #e0e0e0;
        border-top-color: #3b82f6;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loading-text { font-size: 14px; color: #111; }
    </style>
    <script>
      var jsonData = []
      var assetsJson = {}

      // Loading overlay helper
      function showLoading(text) {
        var el = document.getElementById('loadingOverlay');
        if (!el) return;
        el.style.display = 'flex';
        if (text) el.querySelector('.loading-text').textContent = text;
      }
      function hideLoading() {
        var el = document.getElementById('loadingOverlay');
        if (!el) return;
        el.style.display = 'none';
      }

      function getConversationMessages(conversation) {
          var messages = [];
          var currentNode = conversation.current_node;
          while (currentNode != null) {
              var node = conversation.mapping[currentNode];
              if (
                  node.message &&
                  node.message.content &&
                  node.message.content.parts &&
                  node.message.content.parts.length > 0 &&
                  (node.message.author.role !== "system"  || node.message.metadata.is_user_system_message)
              ) {
                  author = node.message.author.role;
                  if (author === "assistant" || author === "tool") {
                      author = "ChatGPT";
                  } else if (author === "system" && node.message.metadata.is_user_system_message) {
                      author = "Custom user info"
                  }
                  if (node.message.content.content_type == "text" || node.message.content.content_type == "multimodal_text") {
                    var parts = [];
                    for (var i = 0; i < node.message.content.parts.length; i++) {
                      var part = node.message.content.parts[i];
                      if (typeof part === "string" && part.length > 0) {
                        parts.push({text: part});
                      } else if (part.content_type == "audio_transcription") {
                        parts.push({transcript: part.text});
                      } else if (part.content_type == "audio_asset_pointer" || part.content_type == "image_asset_pointer" || part.content_type == "video_container_asset_pointer") {
                        parts.push({asset: part});
                      } else if (part.content_type == "real_time_user_audio_video_asset_pointer") {
                        if (part.audio_asset_pointer) {
                          parts.push({asset: part.audio_asset_pointer});
                        }
                        if (part.video_container_asset_pointer) {
                          parts.push({asset: part.video_container_asset_pointer});
                        }
                        for (var j = 0; j < part.frames_asset_pointers.length; j++) {
                          parts.push({asset: part.frames_asset_pointers[j]});
                        }
                      }
                    }
                    if (parts.length > 0) {
                      messages.push({ author, parts: parts });
                    }
                  }
              }
              currentNode = node.parent;
          }
          return messages.reverse();
      }

      function renderData(dataArray, assets) {
          var root = document.getElementById("root");
          root.innerHTML = '';
          assetsJson = assets || {};
          if (!dataArray) return;
          for (var i = 0; i < dataArray.length; i++) {
              var conversation = dataArray[i];
              var messages = getConversationMessages(conversation);
              var div = document.createElement("div");
              div.className = "conversation";
              div.innerHTML = "<h4>" + (conversation.title||'Untitled') + "</h4>";
              for (var j = 0; j < messages.length; j++) {
                  var message = document.createElement("pre");
                  message.className = "message";
                  message.innerHTML = `<div class="author">${messages[j].author}</div>`
                  if (messages[j].parts) {
                    for (var k = 0; k < messages[j].parts.length; k++) {
                      var part = messages[j].parts[k];
                      if (part.text) {
                        message.innerHTML += `<div>${part.text}</div>`;
                      } else if (assetsJson) {
                        if (part.transcript) {
                          message.innerHTML += `<div>[Transcript]: ${part.transcript}</div>`;
                        } else if (part.asset) {
                          var link = assetsJson[part.asset.asset_pointer];
                          if (link) {
                            message.innerHTML += `<div>[File]: <a href="${link}">${link}</a></div>`;
                          } else {
                            message.innerHTML += `<div>[File]: -Deleted-</div>`;
                          }
                        }
                      }
                    }
                  }
                  div.appendChild(message);
              }
              root.appendChild(div);
          }
      }

      // wire open button and default load with loading overlay
     window.addEventListener('DOMContentLoaded', function() {
          var btn = document.getElementById('openFileBtn');
          btn.addEventListener('click', async function() {
              if (!window.api || !window.api.openFile) {
                  alert('File open API not available');
                  return;
              }
              showLoading('Loading...');
              try {
                var res = await window.api.openFile();
                if (!res) return;
                if (res.error) {
                  alert('Error loading file: ' + res.error);
                  return;
                }
                var parsed = res.data;
                var toRender = null;
                var assets = null;
                if (Array.isArray(parsed)) {
                  toRender = parsed;
                } else if (parsed && parsed.conversations) {
                  toRender  = parsed.conversations;
                  assets = parsed.assets || null;
                } else if (parsed) {
                  toRender = [parsed];
                }
                renderData(toRender, assets);
              } catch (e) {
                console.error(e);
                alert('Error loading file');
              } finally {
                hideLoading();
              }
          });

          // try to load default conversations from the local Conversation folder
          if (window.api && window.api.loadDefault) {
            showLoading('Loading default conversations...');
            window.api.loadDefault().then(res => {
              if (!res || res.error || !res.data) return;
              var parsed = res.data;
              var toRender = null;
              var assets = null;
              if (Array.isArray(parsed)) {
                toRender = parsed;
              } else if (parsed && parsed.conversations) {
                toRender = parsed.conversations;
                assets = parsed.assets || null;
              } else if (parsed) {
                toRender = [parsed];
              }
              renderData(toRender, assets);
            }).catch(()=>{}).finally(() => hideLoading());
          }
      });
    </script>
  </head>
  <body>
    <div id="controls">
      <button id="openFileBtn">Open Export File</button>
    </div>
    <div id="loadingOverlay">
      <div class="loading-box">
        <div class="spinner" aria-hidden="true"></div>
        <div class="loading-text">Loading...</div>
      </div>
    </div>
    <div id="root"></div>
  </body>
</html>
