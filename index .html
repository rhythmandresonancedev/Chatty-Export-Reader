<html>
  <head>
    <title>ChatGPT Conversation Reader</title>
    <style>
      body {
        font-family: 'SF Pro Display',-apple-system-headline, system-ui,'Segoe UI',Roboto, Helvetica, Arial, sans-serif;
        background: url('./images/background.png') center / cover no-repeat fixed;
        
        color: #DDD;
        margin: 0;
        padding: 20px;
        text-align: left;
        display: flex;
        justify-content: center;
      }

      .content
      {
        max-width: 960;
        min-height: 100%;
        align-content: center;
      }

      #controls {
        margin-bottom: 12px;
      }
      button {
        padding: 8px 12px;
        font-size: 14px;
      }
      h4 {
        margin: 0;
        font-size: 1.5rem;
        letter-spacing: 0.02em;
        color: #EEE;
        text-align: center;
        margin-bottom: 40px;
      }

      h4::after {
        content: "";
        display: block;
        width: 3em;
        height: 1px;
        background:  #DDD;
        opacity: 15%;
        margin: 15px auto 0;
      }

      #root {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
      .conversation {
        padding: 20px;
        display: flex;
        flex-direction: column;
        width: 100%;
        background: #222222;
        border-radius: 5px;
        margin-bottom: 20px;
      }

      .message-header {
        font-size: .8rem;
        display: flex;
        justify-content: left;
        opacity: 25%;
        margin-bottom: 6px;
        column-gap: 10px;
      }

      .message {
        padding: 8px;
        border-radius: 2.5px;
        letter-spacing: 0.02em;
        white-space: pre-wrap;
        margin: 20px 0;
        font-size: 1.1rem;
        opacity: 90%;
      }

      .message.user .message-body{
        color: #abd4ee;
        font-family: "Playpen Sans", cursive;
        font-weight: 300;
        font-style: normal;
      }

      .message.AI .message-body{
        color: #cccc9b;
        font-family: "Play", sans-serif;
        font-weight: 300;
        font-style: normal;
      }

      .author {
        font-weight: bold;
        margin-bottom: 4px;
      }
      .author::first-letter {
        text-transform: uppercase;
      }

      #openFileBtn {
        background: #222222;
        color: #DDD;
        padding: 20px;
        border-radius: 5px;
      }

      /* Loading overlay */
      #loadingOverlay {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.4);
        z-index: 9999;
      }
      .loading-box {
        background: #fff;
        padding: 18px 22px;
        border-radius: 8px;
        display: flex;
        gap: 12px;
        align-items: center;
        box-shadow: 0 6px 20px rgba(0,0,0,0.2);
      }
      .spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 4px solid #e0e0e0;
        border-top-color: #3b82f6;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loading-text { font-size: 14px; color: #111; }
    </style>
    <script>
      var jsonData = []
      var assetsJson = {}

      // Loading overlay helper
      function showLoading(text) {
        var el = document.getElementById('loadingOverlay');
        if (!el) return;
        el.style.display = 'flex';
        if (text) el.querySelector('.loading-text').textContent = text;
      }
      function hideLoading() {
        var el = document.getElementById('loadingOverlay');
        if (!el) return;
        el.style.display = 'none';
      }

      function getConversationMessages(conversation) {
          var messages = [];
          if (!conversation || !conversation.mapping || !conversation.current_node) return messages;
          var currentNode = conversation.current_node;
          while (currentNode != null) {
              var node = conversation.mapping[currentNode];
              if (!node) break;
              var metadata = (node && node.message && node.message.metadata) || {};
              if (
                  node.message &&
                  node.message.content &&
                  node.message.content.parts &&
                  node.message.content.parts.length > 0 &&
                  (node.message.author.role !== "system"  || metadata.is_user_system_message)
              ) {
                  var author = node.message.author.role;
                  if (author === "assistant" || author === "tool") {
                      author = "ChatGPT";
                  } else if (author === "system" && metadata.is_user_system_message) {
                      author = "Custom user info"
                  }
                  if (node.message.content.content_type == "text" || node.message.content.content_type == "multimodal_text") {
                    var parts = [];
                    for (var i = 0; i < node.message.content.parts.length; i++) {
                      var part = node.message.content.parts[i];
                      if (typeof part === "string" && part.length > 0) {
                        parts.push({text: part});
                      } else if (part.content_type == "audio_transcription") {
                        parts.push({transcript: part.text});
                      } else if (part.content_type == "audio_asset_pointer" || part.content_type == "image_asset_pointer" || part.content_type == "video_container_asset_pointer") {
                        parts.push({asset: part});
                      } else if (part.content_type == "real_time_user_audio_video_asset_pointer") {
                        if (part.audio_asset_pointer) {
                          parts.push({asset: part.audio_asset_pointer});
                        }
                        if (part.video_container_asset_pointer) {
                          parts.push({asset: part.video_container_asset_pointer});
                        }
                        var frames = part.frames_asset_pointers || [];
                        for (var j = 0; j < frames.length; j++) {
                          parts.push({asset: frames[j]});
                        }
                      }
                    }
                    if (parts.length > 0) {
                      var timestampRaw = Number(node.message.create_time) || 0;
                      var model = metadata.model_slug || metadata.model || null;
                      var timestamp = timestampRaw
                        ? new Date(timestampRaw * 1000).toLocaleString()
                        : null;

                      messages.push({ author, parts: parts, timestamp, timestampRaw, model });
                    }
                  }
              }
              currentNode = node.parent;
          }
          return messages.reverse();
      }

      function setImportUiState(hasConversations) {
          var controls = document.getElementById('controls');
          if (controls) controls.style.display = hasConversations ? 'none' : 'block';
          if (window.api && window.api.setImportMenuVisible) {
            window.api.setImportMenuVisible(!!hasConversations);
          }
      }

      function isSafeLink(url) {
          if (typeof url !== "string" || url.length === 0) return false;
          try {
            var parsed = new URL(url, window.location.href);
            return parsed.protocol === "http:" || parsed.protocol === "https:" || parsed.protocol === "file:";
          } catch (e) {
            return false;
          }
      }

      function renderData(dataArray, assets) {
          var root = document.getElementById("root");
          root.innerHTML = '';
          assetsJson = assets || {};
          if (!Array.isArray(dataArray) || dataArray.length === 0) {
            setImportUiState(false);
            return;
          }

          setImportUiState(true);

          var allMessages = [];
          for (var i = 0; i < dataArray.length; i++) {
              var conversation = dataArray[i];
              if (!conversation) continue;
              var messages = getConversationMessages(conversation);
              var conversationTitle = conversation.title || "Untitled";
              var conversationKey = conversation.conversation_id || conversation.id || conversationTitle;
              for (var j = 0; j < messages.length; j++) {
                allMessages.push({
                  author: messages[j].author,
                  parts: messages[j].parts,
                  timestamp: messages[j].timestamp,
                  timestampRaw: Number(messages[j].timestampRaw) || 0,
                  model: messages[j].model,
                  conversationTitle: conversationTitle,
                  conversationKey: conversationKey
                });
              }
          }

          allMessages.sort(function(a, b) {
              return a.timestampRaw - b.timestampRaw;
          });

          var currentConversationKey = null;
          var currentConversationDiv = null;
          for (var m = 0; m < allMessages.length; m++) {
              var item = allMessages[m];
              if (item.conversationKey !== currentConversationKey) {
                currentConversationKey = item.conversationKey;
                currentConversationDiv = document.createElement("div");
                currentConversationDiv.className = "conversation";
                var heading = document.createElement("h4");
                heading.textContent = item.conversationTitle;
                currentConversationDiv.appendChild(heading);
                root.appendChild(currentConversationDiv);
              }

              var message = document.createElement("div");

              var roleClass = "";
              if (item.author === "user") {
                roleClass = " user";
              } else if (item.author === "ChatGPT") {
                roleClass = " AI";
              }
              message.className = "message" + roleClass;
              var header = document.createElement("div");
              header.className = "message-header";

              var author = document.createElement("span");
              author.className = "author";
              author.textContent = item.author;
              header.appendChild(author);

              var timestamp = document.createElement("span");
              timestamp.className = "timestamp";
              timestamp.textContent = item.timestamp ? item.timestamp : "";
              header.appendChild(timestamp);

              var model = document.createElement("span");
              model.className = "model";
              model.textContent = item.model ? item.model : "";
              header.appendChild(model);

              message.appendChild(header);


              var body = document.createElement("div");
              body.className = "message-body";
              if (item.parts) {
                for (var k = 0; k < item.parts.length; k++) {
                  var part = item.parts[k];
                  if (part.text) {
                    var textPart = document.createElement("div");
                    textPart.textContent = part.text;
                    body.appendChild(textPart);
                  } else if (assetsJson) {
                    if (part.transcript) {
                      var transcriptPart = document.createElement("div");
                      transcriptPart.textContent = "[Transcript]: " + part.transcript;
                      body.appendChild(transcriptPart);
                    } else if (part.asset) {
                      var link = assetsJson[part.asset.asset_pointer];
                      var filePart = document.createElement("div");
                      if (link && isSafeLink(link)) {
                        filePart.appendChild(document.createTextNode("[File]: "));
                        var anchor = document.createElement("a");
                        anchor.textContent = link;
                        anchor.setAttribute("href", link);
                        anchor.setAttribute("target", "_blank");
                        anchor.setAttribute("rel", "noopener noreferrer");
                        filePart.appendChild(anchor);
                      } else {
                        filePart.textContent = "[File]: -Deleted-";
                      }
                      body.appendChild(filePart);
                    }
                  }
                }
              }
              message.appendChild(body);

              currentConversationDiv.appendChild(message);
          }
      }

      // wire open button and default load with loading overlay
      window.addEventListener('DOMContentLoaded', function() {
          async function importAndRender() {
            if (!window.api || !window.api.openFile) {
              alert('File open API not available');
              return;
            }
            showLoading('Loading...');
            try {
              var res = await window.api.openFile();
              if (!res) return;
              if (res.error) {
                alert('Error loading file: ' + res.error);
                return;
              }
              var parsed = res.data;
              var toRender = null;
              var assets = null;
              if (Array.isArray(parsed)) {
                toRender = parsed;
              } else if (parsed && parsed.conversations) {
                toRender  = parsed.conversations;
                assets = parsed.assets || null;
              } else if (parsed) {
                toRender = [parsed];
              }
              renderData(toRender, assets);
            } catch (e) {
              console.error(e);
              alert('Error loading file');
            } finally {
              hideLoading();
            }
          }

          var btn = document.getElementById('openFileBtn');
          if (btn) {
            btn.addEventListener('click', importAndRender);
          }

          if (window.api && window.api.onImportFromMenu) {
            window.api.onImportFromMenu(importAndRender);
          }

          setImportUiState(false);

          // try to load default conversations from the local Conversation folder
          if (window.api && window.api.loadDefault) {
            showLoading('Loading default conversation...');
            window.api.loadDefault().then(res => {
              if (!res || res.error || !res.data) return;
              var parsed = res.data;
              var toRender = null;
              var assets = null;
              if (Array.isArray(parsed)) {
                toRender = parsed;
              } else if (parsed && parsed.conversations) {
                toRender = parsed.conversations;
                assets = parsed.assets || null;
              } else if (parsed) {
                toRender = [parsed];
              }
              renderData(toRender, assets);
            }).catch(()=>{}).finally(() => hideLoading());
          }
      });
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Schoolbell&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@100..800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="content">
      <div id="controls">
        <button id="openFileBtn">Open Conversation</button>
      </div>
      <div id="loadingOverlay">
        <div class="loading-box">
          <div class="spinner" aria-hidden="true"></div>
          <div class="loading-text">Loading...</div>
        </div>
      </div>
      <div id="root"></div>
    </div>
  </body>
</html>
